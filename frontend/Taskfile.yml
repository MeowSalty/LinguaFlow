version: '3'

vars:
  OPENAPI_SCHEMA: ../backend/backend/api/openapi/openapi-3.0.yaml
  SDK_DIR: src/api
  OPENAPI_TYPES: '{{.SDK_DIR}}/openapi.d.ts'
  SDK_CLIENT: '{{.SDK_DIR}}/client.ts'

tasks:
  api:check-schema:
    desc: Check whether the backend OpenAPI specification exists
    preconditions:
      - sh: |
          node -e "process.exit(require('node:fs').existsSync('{{.OPENAPI_SCHEMA}}') ? 0 : 1)"
        msg: |
          OpenAPI specification not found at {{.OPENAPI_SCHEMA}}. Please run this task after switching to a branch that contains the backend API specification.

  api:generate-types:
    desc: Generate TypeScript definitions from the backend OpenAPI specification
    deps:
      - api:check-schema
    sources:
      - '{{.OPENAPI_SCHEMA}}'
    generates:
      - '{{.OPENAPI_TYPES}}'
    cmds:
      - cmd: |
          node -e "require('node:fs').mkdirSync('{{.SDK_DIR}}', { recursive: true })"
      - cmd: |
          pnpm exec openapi-typescript {{.OPENAPI_SCHEMA}} -o {{.OPENAPI_TYPES}}

  api:generate-client:
    desc: Generate the openapi-fetch client entrypoint
    deps:
      - api:generate-types
    generates:
      - '{{.SDK_CLIENT}}'
    cmds:
      - cmd: |
          node -e "const fs = require('node:fs'); fs.mkdirSync('{{.SDK_DIR}}', { recursive: true }); fs.writeFileSync('{{.SDK_CLIENT}}', \"import createClient from 'openapi-fetch'\\n\\nimport type { paths } from './openapi'\\n\\nexport const apiClient = createClient<paths>({\\n  baseUrl: import.meta.env.VITE_API_BASE_URL ?? '/api',\\n})\\n\\nexport type ApiClient = typeof apiClient\\n\")"

  api:generate:
    desc: Generate the typed frontend API SDK from the backend OpenAPI specification
    cmds:
      - task: api:generate-client

  api:clean:
    desc: Remove generated frontend API SDK files
    cmds:
      - cmd: |
          node -e "const fs = require('node:fs'); for (const file of ['{{.OPENAPI_TYPES}}', '{{.SDK_CLIENT}}']) fs.rmSync(file, { force: true })"
