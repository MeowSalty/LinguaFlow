CreateTranslationJobRequest:
  type: object
  required: [execution_plan_id]
  properties:
    execution_plan_id:
      type: integer
      description: 执行计划模板 ID
    resource_ids:
      type: array
      items:
        type: integer
        minimum: 1
    segment_ids:
      type: array
      items:
        type: integer
        minimum: 1
    segment_group_keys:
      type: array
      items:
        type: string
      description: |
        按章节分组键选择 segments（仅适用于 EPUB 等多章节资源）。
        传入 meta.epub_file 值（如 ["OEBPS/chapter1.xhtml"]），后端自动解析为对应的 segment_ids。
        与 segment_ids 互斥，优先级：segment_group_keys > segment_ids > resource_ids。
    auto_approve:
      type: boolean
      default: false
      description: 翻译完成后是否自动审批通过所有段落
    overwrite_mode:
      type: string
      enum: [skip_translated, overwrite_unapproved, overwrite_all]
      default: skip_translated
      description: |
        段落覆盖策略。
        - skip_translated: 跳过已有翻译的段落（仅翻译 pending/rejected）
        - overwrite_unapproved: 覆盖所有非 approved 的段落（包括已翻译、已编辑和已拒绝的）
        - overwrite_all: 覆盖所有段落，包括已审核通过的
        对 segment_ids 选择方式无效（用户已精确指定段落）。
    translation_config:
      type: object
      additionalProperties: true
  additionalProperties: false

TranslationJobResource:
  type: object
  required: [id, resource_id, status, segment_count, completed_segments, created_at, updated_at]
  properties:
    id:
      type: integer
    resource_id:
      type: integer
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    segment_ids:
      type: array
      items:
        type: integer
    segment_count:
      type: integer
    completed_segments:
      type: integer
    output_path:
      type: string
    error_message:
      type: string
    resource:
      $ref: './resource.yaml#/Resource'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    current_stage:
      type: string
      description: 当前执行阶段名称
    stage_total:
      type: integer
      description: 当前阶段的总段落数
    stage_completed:
      type: integer
      description: 当前阶段已完成的段落数
    started_at:
      type: string
      format: date-time
      description: 资源开始执行的时间

TranslationJob:
  type: object
  required: [id, project_id, execution_plan_id, status, trigger_type, resource_count, completed_resources, failed_resources, total_segments, completed_segments, created_at, updated_at]
  properties:
    id:
      type: integer
    project_id:
      type: integer
    execution_plan_id:
      type: integer
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    trigger_type:
      type: string
      enum: [manual, file_update, glossary_change, web_edit]
    translation_config:
      type: object
      additionalProperties: true
    resource_count:
      type: integer
    completed_resources:
      type: integer
    failed_resources:
      type: integer
    total_segments:
      type: integer
      description: 总段落数（创建时为选中的 segment 数，ReconcileJob 修正为实际翻译量）
    stage_total:
      type: integer
      description: 实际需要翻译的段落数（ReconcileJob 从各资源的 stage_total 聚合，执行中动态更新）
    completed_segments:
      type: integer
    error_message:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    job_resources:
      type: array
      items:
        $ref: '#/TranslationJobResource'
    started_at:
      type: string
      format: date-time
      description: 任务开始执行的时间
    current_stage:
      type: string
      description: 当前活跃的执行阶段名称（聚合自 JobResource）
    queue_position:
      type: integer
      nullable: true
      description: 在队列中的位置（1-based），null 表示不在队列中
    queue_size:
      type: integer
      nullable: true
      description: 当前队列中的任务总数

TranslationJobListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/TranslationJob'
    next_cursor:
      type: string
