CreateTranslationJobRequest:
  type: object
  required: [execution_plan_id]
  properties:
    execution_plan_id:
      type: integer
      description: 执行计划模板 ID
    resource_ids:
      type: array
      items:
        type: integer
        minimum: 1
    segment_ids:
      type: array
      items:
        type: integer
        minimum: 1
    segment_group_keys:
      type: array
      items:
        type: string
      description: |
        按章节分组键选择 segments（仅适用于 EPUB 等多章节资源）。
        传入 meta.epub_file 值（如 ["OEBPS/chapter1.xhtml"]），后端自动解析为对应的 segment_ids。
        与 segment_ids 互斥，优先级：segment_group_keys > segment_ids > resource_ids。
    auto_approve:
      type: boolean
      default: false
      description: 翻译完成后是否自动审批通过所有段落
    translation_config:
      type: object
      additionalProperties: true
  additionalProperties: false

TranslationJobResource:
  type: object
  required: [id, resource_id, status, segment_count, completed_segments, created_at, updated_at]
  properties:
    id:
      type: integer
    resource_id:
      type: integer
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    segment_ids:
      type: array
      items:
        type: integer
    segment_count:
      type: integer
    completed_segments:
      type: integer
    output_path:
      type: string
    error_message:
      type: string
    resource:
      $ref: './resource.yaml#/Resource'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TranslationJob:
  type: object
  required: [id, project_id, execution_plan_id, status, trigger_type, resource_count, completed_resources, failed_resources, total_segments, completed_segments, created_at, updated_at]
  properties:
    id:
      type: integer
    project_id:
      type: integer
    execution_plan_id:
      type: integer
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    trigger_type:
      type: string
      enum: [manual, file_update, glossary_change, web_edit]
    translation_config:
      type: object
      additionalProperties: true
    resource_count:
      type: integer
    completed_resources:
      type: integer
    failed_resources:
      type: integer
    total_segments:
      type: integer
    completed_segments:
      type: integer
    error_message:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    job_resources:
      type: array
      items:
        $ref: '#/TranslationJobResource'

TranslationJobListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/TranslationJob'
    next_cursor:
      type: string
