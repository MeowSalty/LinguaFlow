TranslationTemplate:
  type: object
  required: [id, name, is_builtin, scope]
  properties:
    id:
      type: integer
    name:
      type: string
    description:
      type: string
    icon:
      type: string
    is_builtin:
      type: boolean
    scope:
      type: string
      enum: [builtin, user, org]
    owner_user_id:
      type: integer
      nullable: true
    owner_org_id:
      type: integer
      nullable: true
    system_prompt:
      type: string
      description: 自定义 system prompt；为空表示使用系统默认
    prompt_vars:
      type: object
      additionalProperties: true
    translation_config:
      type: object
      additionalProperties: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TemplateListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/TranslationTemplate'

CreateTemplateRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string
    icon:
      type: string
    system_prompt:
      type: string
    prompt_vars:
      type: object
      additionalProperties: true
    translation_config:
      type: object
      additionalProperties: true
  additionalProperties: false

UpdateTemplateRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    icon:
      type: string
    system_prompt:
      type: string
    prompt_vars:
      type: object
      additionalProperties: true
    translation_config:
      type: object
      additionalProperties: true
  additionalProperties: false
