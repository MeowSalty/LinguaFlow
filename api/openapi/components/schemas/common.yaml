HealthResponse:
  type: object
  required: [status]
  properties:
    status:
      type: string
      example: ok
    service:
      type: string
      example: linguaflow

ModeResponse:
  type: object
  required: [mode]
  properties:
    mode:
      type: string
      enum: [local, server]
      x-enum-varnames:
        - ModeLocal
        - ModeServer

Problem:
  type: object
  required: [title, status]
  properties:
    type:
      type: string
    title:
      type: string
    status:
      type: integer
    detail:
      type: string
