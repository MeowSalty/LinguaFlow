HealthResponse:
  type: object
  required: [status]
  properties:
    status:
      type: string
      example: ok
    service:
      type: string
      example: linguaflow

Problem:
  type: object
  required: [title, status]
  properties:
    type:
      type: string
    title:
      type: string
    status:
      type: integer
    detail:
      type: string
