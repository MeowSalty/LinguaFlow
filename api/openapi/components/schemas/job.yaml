CreateJobRequest:
  type: object
  required: [execution_plan_id]
  properties:
    execution_plan_id:
      type: integer
      description: 执行计划模板 ID
    resource_ids:
      type: array
      items:
        type: integer
        minimum: 1
    segment_ids:
      type: array
      items:
        type: integer
        minimum: 1
    segment_group_keys:
      type: array
      items:
        type: string
      description: |
        按章节分组键选择 segments（仅适用于 EPUB 等多章节资源）。
        传入 meta.epub_file 值（如 ["OEBPS/chapter1.xhtml"]），后端自动解析为对应的 segment_ids。
        与 segment_ids 互斥，优先级：segment_group_keys > segment_ids > resource_ids。
    segment_filter:
      type: string
      enum: [pending_only, skip_approved, all]
      description: |
        覆盖执行模板中翻译轮次的段落过滤策略（仅对翻译轮次生效）。
        - pending_only: 仅处理 pending 和 rejected 状态的段落
        - skip_approved: 处理除 approved 外的所有状态
        - all: 处理所有状态的段落
        省略时使用执行模板中的配置。
    auto_approve:
      type: boolean
      default: false
      description: 翻译完成后是否自动审批通过所有段落
    execution_config:
      type: object
      additionalProperties: true
  additionalProperties: false

JobProgress:
  type: object
  required: [total_resources, completed_resources, failed_resources, total_segments, completed_segments, skipped_segments]
  properties:
    total_resources:
      type: integer
    completed_resources:
      type: integer
    failed_resources:
      type: integer
    total_segments:
      type: integer
      description: 总段落数（创建时选中的 segment 数）
    completed_segments:
      type: integer
    skipped_segments:
      type: integer
      description: 被系统跳过的段落数（已翻译、空文本、纯占位符等）
    queue_position:
      type: integer
      nullable: true
      description: 在队列中的位置（1-based），null 表示不在队列中
    queue_size:
      type: integer
      nullable: true
      description: 当前队列中的任务总数

JobResource:
  type: object
  required: [id, resource_id, status, segment_count, completed_segments, skipped_segments, created_at, updated_at]
  properties:
    id:
      type: integer
    resource_id:
      type: integer
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    segment_count:
      type: integer
    completed_segments:
      type: integer
    skipped_segments:
      type: integer
      description: 被系统跳过的段落数
    output_path:
      type: string
    error_message:
      type: string
    resource:
      $ref: './resource.yaml#/Resource'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    current_stage:
      type: string
      description: 当前执行阶段名称
    stage_total:
      type: integer
      description: 当前阶段的总段落数
    stage_completed:
      type: integer
      description: 当前阶段已完成的段落数
    started_at:
      type: string
      format: date-time
      description: 资源开始执行的时间

Job:
  type: object
  required: [id, project_id, execution_plan_id, status, trigger_type, progress, created_at, updated_at]
  properties:
    id:
      type: integer
    project_id:
      type: integer
    created_by:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
    execution_plan_id:
      type: integer
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    trigger_type:
      type: string
      enum: [manual, file_update, glossary_change, web_edit]
    execution_config:
      type: object
      additionalProperties: true
      description: 执行配置快照（已脱敏，不含 API 密钥）
    error_message:
      type: string
    progress:
      $ref: '#/JobProgress'
    job_resources:
      type: array
      items:
        $ref: '#/JobResource'
    started_at:
      type: string
      format: date-time
      description: 任务开始执行的时间
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

JobListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Job'
    next_cursor:
      type: string

Segment:
  type: object
  required: [id, sub_job_id, segment_index, source_text, status, created_at, updated_at]
  properties:
    id:
      type: integer
    sub_job_id:
      type: integer
    segment_index:
      type: integer
    source_text:
      type: string
    target_text:
      type: string
    status:
      type: string
      enum: [pending, translated, edited, approved, rejected]
    review_comment:
      type: string
    reviewed_by:
      $ref: '../../base.yaml#/components/schemas/User'
    quality_issues:
      type: array
      description: QA 检测到的质量问题列表
      items:
        $ref: '#/QualityIssue'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

QualityIssue:
  type: object
  required: [segment_index, severity, code, message]
  properties:
    segment_index:
      type: integer
    severity:
      type: string
      enum: [warning, error]
    code:
      type: string
      description: 问题代码（untranslated, length_ratio, duplicate, source_residual）
    message:
      type: string

SegmentEditRequest:
  type: object
  required: [target_text]
  properties:
    target_text:
      type: string
    comment:
      type: string
  additionalProperties: false

SegmentDecisionRequest:
  type: object
  properties:
    comment:
      type: string
  additionalProperties: false

UsageStats:
  type: object
  required: [api_calls, input_tokens, output_tokens, segment_count, usage_records, completed_jobs, failed_jobs]
  properties:
    api_calls:
      type: integer
    input_tokens:
      type: integer
    output_tokens:
      type: integer
    segment_count:
      type: integer
    usage_records:
      type: integer
    completed_jobs:
      type: integer
    failed_jobs:
      type: integer

Activity:
  type: object
  required: [id, action, resource_type, created_at, updated_at]
  properties:
    id:
      type: integer
    action:
      type: string
    resource_type:
      type: string
    resource_id:
      type: integer
    message:
      type: string
    metadata:
      type: object
      additionalProperties: true
    actor:
      $ref: '../../base.yaml#/components/schemas/User'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ActivityListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Activity'
    next_cursor:
      type: string
