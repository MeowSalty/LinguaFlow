PrunePromptTemplateScope:
  type: string
  enum: [user, org, system]

PrunePromptTemplate:
  type: object
  required: [id, name, description, scope]
  properties:
    id:
      type: integer
    name:
      type: string
    description:
      type: string
    scope:
      $ref: '#/PrunePromptTemplateScope'
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    content:
      type: string
      description: 术语精简提示词内容。
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

PrunePromptTemplateListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/PrunePromptTemplate'

CreatePrunePromptTemplateRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string
    content:
      type: string
      description: 术语精简提示词内容。
  additionalProperties: false

UpdatePrunePromptTemplateRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    content:
      type: string
      description: 术语精简提示词内容。
  additionalProperties: false
