TranslationPromptTemplateScope:
  type: string
  enum: [user, org, system]

TranslationPromptTemplate:
  type: object
  required: [id, name, description, scope]
  properties:
    id:
      type: integer
    name:
      type: string
    description:
      type: string
    scope:
      $ref: '#/TranslationPromptTemplateScope'
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    system_prompt_content:
      type: string
      description: 翻译提示词内容。
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TranslationPromptTemplateListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/TranslationPromptTemplate'

CreateTranslationPromptTemplateRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string
    system_prompt_content:
      type: string
      description: 翻译提示词内容。
  additionalProperties: false

UpdateTranslationPromptTemplateRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    system_prompt_content:
      type: string
      description: 翻译提示词内容。
  additionalProperties: false
