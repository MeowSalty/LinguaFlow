Project:
  type: object
  required: [id, name, source_lang, target_lang, glossary_enabled]
  properties:
    id:
      type: integer
    name:
      type: string
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    config:
      type: object
      additionalProperties: true
    default_translation_config:
      type: object
      additionalProperties: true
    glossary_enabled:
      type: boolean
      default: false
      description: 翻译过程中是否启用术语表
    source_lang:
      type: string
    target_lang:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ProjectListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Project'

CreateProjectRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    config:
      type: object
      additionalProperties: true
    default_translation_config:
      type: object
      additionalProperties: true
    glossary_enabled:
      type: boolean
      default: false
      description: 翻译过程中是否启用术语表
    source_lang:
      type: string
    target_lang:
      type: string
  additionalProperties: false

UpdateProjectRequest:
  type: object
  properties:
    name:
      type: string
    config:
      type: object
      additionalProperties: true
    default_translation_config:
      type: object
      additionalProperties: true
    glossary_enabled:
      type: boolean
      description: 翻译过程中是否启用术语表
    source_lang:
      type: string
    target_lang:
      type: string
  additionalProperties: false

