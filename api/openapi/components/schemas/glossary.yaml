GlossaryEntry:
  type: object
  required: [id, source, target, case_sensitive]
  properties:
    id:
      type: integer
    source:
      type: string
    target:
      type: string
    case_sensitive:
      type: boolean
    notes:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

GlossaryListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/GlossaryEntry'

CreateGlossaryEntryRequest:
  type: object
  required: [source, target]
  properties:
    source:
      type: string
    target:
      type: string
    case_sensitive:
      type: boolean
      default: false
    notes:
      type: string
  additionalProperties: false

UpdateGlossaryEntryRequest:
  type: object
  required: [source, target]
  properties:
    source:
      type: string
    target:
      type: string
    case_sensitive:
      type: boolean
    notes:
      type: string
  additionalProperties: false

UpdateGlossaryEntryResponse:
  allOf:
    - $ref: '#/GlossaryEntry'
    - type: object
      properties:
        target_changed:
          type: boolean
          description: target 字段是否发生变更

GlossaryImportResult:
  type: object
  required: [added]
  properties:
    added:
      type: integer
    skipped:
      type: array
      items:
        type: object
        properties:
          line:
            type: integer
          source:
            type: string
          reason:
            type: string

GlossarySyncImpactRequest:
  type: object
  required: [old_target]
  properties:
    old_target:
      type: string
      description: 修改前的旧 target 值
    new_target:
      type: string
      description: 修改后的新 target 值
    resource_ids:
      type: array
      items:
        type: integer
      description: 限定影响分析的资源范围（可选，为空则分析所有资源）
  additionalProperties: false

GlossarySyncImpactResource:
  type: object
  required: [resource_id, resource_path, affected_count]
  properties:
    resource_id:
      type: integer
    resource_path:
      type: string
    affected_count:
      type: integer

GlossarySyncImpactResponse:
  type: object
  required: [old_target, new_target, total_affected, resources]
  properties:
    old_target:
      type: string
    new_target:
      type: string
    total_affected:
      type: integer
    resources:
      type: array
      items:
        $ref: '#/GlossarySyncImpactResource'

GlossarySyncExecuteRequest:
  type: object
  required: [old_target, new_target]
  properties:
    old_target:
      type: string
    new_target:
      type: string
    resource_ids:
      type: array
      items:
        type: integer
      description: 限定同步的资源范围
  additionalProperties: false

GlossarySyncExecuteResponse:
  type: object
  required: [task_id, status, status_url]
  properties:
    task_id:
      type: string
      description: 异步任务唯一标识
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    status_url:
      type: string
      description: 任务状态轮询端点

GlossarySyncTaskStatusResponse:
  type: object
  required: [task_id, status, processed, total]
  properties:
    task_id:
      type: string
    status:
      type: string
      enum: [pending, running, completed, failed, cancelled]
    processed:
      type: integer
      description: 已处理的段落数
    total:
      type: integer
      description: 待处理的段落总数
    result:
      type: object
      description: 任务完成后的结果摘要（仅 status=completed 时存在）
      properties:
        total_updated:
          type: integer
        total_skipped:
          type: integer
        resources:
          type: array
          items:
            $ref: '#/GlossarySyncExecuteResourceResult'
    error:
      type: string
      description: 错误信息（仅 status=failed 时存在）
    cancelled_at:
      type: string
      format: date-time

GlossarySyncTaskCancelResponse:
  type: object
  required: [task_id, status]
  properties:
    task_id:
      type: string
    status:
      type: string
      enum: [cancelled]

GlossarySyncExecuteResourceResult:
  type: object
  required: [resource_id, resource_path, updated_count, skipped_count]
  properties:
    resource_id:
      type: integer
    resource_path:
      type: string
    updated_count:
      type: integer
    skipped_count:
      type: integer

GlossaryPruneRequest:
  type: object
  required: [backend_id]
  properties:
    backend_id:
      type: integer
      description: 用于精简分析的后端 ID
    template_id:
      type: integer
      description: 精简提示词模板 ID，省略或为 0 时使用内置默认模板
  additionalProperties: false

GlossaryPruneSuggestion:
  type: object
  required: [entry_id, action, source, old_target, new_target, old_notes, new_notes, target_changed, notes_changed]
  properties:
    entry_id:
      type: integer
    action:
      type: string
      enum: [delete, update]
    source:
      type: string
    old_target:
      type: string
    new_target:
      type: string
    old_notes:
      type: string
    new_notes:
      type: string
    target_changed:
      type: boolean
    notes_changed:
      type: boolean

GlossaryPruneDiagnostics:
  type: object
  properties:
    backend_name:
      type: string
    template_name:
      type: string
    duration_ms:
      type: integer
    prompt_tokens:
      type: integer
    completion_tokens:
      type: integer
    system_prompt:
      type: string
      description: 发送给 LLM 的 system prompt 内容（截断至 128KB）。
    user_message:
      type: string
      description: 发送给 LLM 的 user message 内容（截断至 128KB）。
    system_truncated:
      type: boolean
    user_truncated:
      type: boolean
    system_length:
      type: integer
    user_length:
      type: integer
    received_content:
      type: string
      description: LLM 返回的原始响应内容（截断至 128KB）。
    received_truncated:
      type: boolean
    received_length:
      type: integer
    entry_count:
      type: integer
    parsed_count:
      type: integer
    repaired_ops:
      type: array
      items:
        type: string
    error_type:
      type: string
    error_message:
      type: string
    http_status:
      type: integer

GlossaryPrunePreview:
  type: object
  required: [suggestions, total, to_delete, to_update, to_keep, diagnostics]
  properties:
    suggestions:
      type: array
      items:
        $ref: '#/GlossaryPruneSuggestion'
    total:
      type: integer
    to_delete:
      type: integer
    to_update:
      type: integer
    to_keep:
      type: integer
    diagnostics:
      $ref: '#/GlossaryPruneDiagnostics'

GlossaryPruneApplyRequest:
  type: object
  required: [changes]
  properties:
    changes:
      type: array
      items:
        type: object
        required: [entry_id, action]
        properties:
          entry_id:
            type: integer
          action:
            type: string
            enum: [delete, update]
          target:
            type: string
            description: 新 target（仅 action=update 时使用）
          notes:
            type: string
            description: 新 notes（仅 action=update 时使用）
  additionalProperties: false

GlossaryPruneApplyResult:
  type: object
  required: [deleted, updated, failed]
  properties:
    deleted:
      type: integer
    updated:
      type: integer
    failed:
      type: integer
