RetryConfig:
  type: object
  properties:
    max_attempts:
      type: integer
      minimum: 1
      default: 3
    backoff_ms:
      type: integer
      minimum: 0
      default: 2000
    jitter:
      type: boolean
      default: true

TranslateSegmentFilterConfig:
  type: object
  description: 翻译轮次段落过滤配置，决定处理哪些翻译状态的段落。
  properties:
    status_filter:
      type: string
      enum: [pending_only, skip_approved, all]
      default: pending_only
      description: |
        - pending_only: 仅处理 pending 和 rejected 状态的段落（默认，等同旧 skip_translated）
        - skip_approved: 处理除 approved 外的所有状态（等同旧 overwrite_unapproved）
        - all: 处理所有状态的段落（等同旧 overwrite_all）

TranslateRoundConfig:
  type: object
  properties:
    prompt_template_id:
      type: integer
      description: 翻译提示词模板 ID
    profile_id:
      type: integer
      description: 策略模板 ID（ExecutionProfile 单表全局唯一）
    batch_size:
      type: integer
      minimum: 0
      description: 段落数上限；0=不限制，与 max_words_per_batch 至少填一项
    max_words_per_batch:
      type: integer
      minimum: 0
      description: 字词数上限；0=不限制，与 batch_size 至少填一项
    fallback_shrink:
      type: number
      minimum: 0
      exclusiveMinimum: true
      maximum: 1
      exclusiveMaximum: true
    segment_filter:
      $ref: '#/TranslateSegmentFilterConfig'
      description: 段落过滤配置；省略时默认 pending_only
    retry:
      $ref: '#/RetryConfig'

ExtractRoundConfig:
  type: object
  properties:
    template_id:
      type: integer
      description: 术语抽取提示词模板 ID（BootstrapPromptTemplate）
    batch_size:
      type: integer
      minimum: 0
      default: 20
      description: 段落数上限；0=不限制，与 max_words_per_batch 至少填一项；两者都为 0 时不分批，全部一次发送
    max_words_per_batch:
      type: integer
      minimum: 0
      description: 字词数上限；0=不限制，与 batch_size 至少填一项；两者都为 0 时不分批，全部一次发送
    max_terms_per_1000_chars:
      type: number
      minimum: 0
      default: 25.0
      description: 每 1000 字词的术语抽取上限系数
    min_source_len:
      type: integer
      minimum: 1
      default: 2
      description: 术语源文最短字符数
    retry:
      $ref: '#/RetryConfig'

AdjudicateRoundConfig:
  type: object
  description: 质量裁决轮次配置。裁决 system prompt 内置不可见，无 prompt_template_id。
  properties:
    batch_size:
      type: integer
      minimum: 0
      description: 段落数上限；0=不限制，与 max_words_per_batch 至少填一项
    max_words_per_batch:
      type: integer
      minimum: 0
      description: 字词数上限；0=不限制，与 batch_size 至少填一项
    adjudicate_codes:
      type: array
      items:
        type: string
        enum: [source_residual, length_ratio]
      description: |
        可裁决的质量问题 code 子集。空或不传时默认 ["source_residual"]。
        untranslated 与 duplicate 为硬规则，不可裁决。
    retry:
      $ref: '#/RetryConfig'

ExecutionRoundConfig:
  type: object
  required: [mode, backend_id, concurrency]
  properties:
    mode:
      type: string
      enum: [translate, extract, adjudicate]
      description: 轮次模式：translate=翻译，extract=术语抽取，adjudicate=质量裁决
    backend_id:
      type: integer
      description: 后端 ID（Backend 单表全局唯一）
    concurrency:
      type: integer
      minimum: 1
    translate:
      $ref: '#/TranslateRoundConfig'
      description: 翻译模式配置（mode=translate 时必填）
    extract:
      $ref: '#/ExtractRoundConfig'
      description: 术语抽取模式配置（mode=extract 时必填）
    adjudicate:
      $ref: '#/AdjudicateRoundConfig'
      description: 质量裁决模式配置（mode=adjudicate 时必填）

ExecutionPlanTemplateScope:
  type: string
  enum: [user, org, system]

ExecutionPlanRubyRetryConfig:
  type: object
  required: [enabled]
  properties:
    enabled:
      type: boolean
      default: false
      description: 是否启用注音对齐重试
    backend_id:
      type: integer
      description: 注音对齐使用的后端 ID；为空或 0 时使用翻译主后端

ExecutionPlanTemplate:
  type: object
  required: [id, name, scope, rounds]
  properties:
    id:
      type: integer
    name:
      type: string
    description:
      type: string
    scope:
      $ref: '#/ExecutionPlanTemplateScope'
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    ruby_retry:
      $ref: '#/ExecutionPlanRubyRetryConfig'
    rounds:
      type: array
      items:
        $ref: '#/ExecutionRoundConfig'
      minItems: 1
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ExecutionPlanTemplateListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/ExecutionPlanTemplate'

CreateExecutionPlanTemplateRequest:
  type: object
  required: [name, rounds]
  properties:
    name:
      type: string
    description:
      type: string
    ruby_retry:
      $ref: '#/ExecutionPlanRubyRetryConfig'
    rounds:
      type: array
      items:
        $ref: '#/ExecutionRoundConfig'
      minItems: 1
  additionalProperties: false

UpdateExecutionPlanTemplateRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    ruby_retry:
      $ref: '#/ExecutionPlanRubyRetryConfig'
    rounds:
      type: array
      items:
        $ref: '#/ExecutionRoundConfig'
      minItems: 1
  additionalProperties: false
