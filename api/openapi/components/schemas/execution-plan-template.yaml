RetryConfig:
  type: object
  properties:
    max_attempts:
      type: integer
      minimum: 1
      default: 3
    backoff_ms:
      type: integer
      minimum: 0
      default: 2000
    jitter:
      type: boolean
      default: true

TranslateRoundConfig:
  type: object
  properties:
    prompt_template_id:
      type: integer
      description: 翻译提示词模板 ID
    profile_id:
      type: integer
      description: 策略模板 ID（TranslationProfile 单表全局唯一）
    batch_size:
      type: integer
      minimum: 0
      description: 段落数上限；0=不限制，与 max_words_per_batch 至少填一项
    max_words_per_batch:
      type: integer
      minimum: 0
      description: 字词数上限；0=不限制，与 batch_size 至少填一项
    fallback_shrink:
      type: number
      minimum: 0
      exclusiveMinimum: true
      maximum: 1
      exclusiveMaximum: true
    retry:
      $ref: '#/RetryConfig'

ExtractRoundConfig:
  type: object
  properties:
    template_id:
      type: integer
      description: 术语抽取提示词模板 ID（BootstrapPromptTemplate）
    batch_size:
      type: integer
      minimum: 1
      default: 20
      description: 每批发送给 LLM 的源文段数
    max_terms_per_1000_chars:
      type: number
      minimum: 0
      default: 25.0
      description: 每 1000 字词的术语抽取上限系数
    min_source_len:
      type: integer
      minimum: 1
      default: 2
      description: 术语源文最短字符数
    retry:
      $ref: '#/RetryConfig'

ExecutionRoundConfig:
  type: object
  required: [mode, backend_id, concurrency]
  properties:
    mode:
      type: string
      enum: [translate, extract]
      description: 轮次模式：translate=翻译，extract=术语抽取
    backend_id:
      type: integer
      description: 后端 ID（Backend 单表全局唯一）
    concurrency:
      type: integer
      minimum: 1
    translate:
      $ref: '#/TranslateRoundConfig'
      description: 翻译模式配置（mode=translate 时必填）
    extract:
      $ref: '#/ExtractRoundConfig'
      description: 术语抽取模式配置（mode=extract 时必填）

ExecutionPlanTemplateScope:
  type: string
  enum: [user, org, system]

ExecutionPlanRubyRetryConfig:
  type: object
  required: [enabled]
  properties:
    enabled:
      type: boolean
      default: false
      description: 是否启用注音对齐重试
    backend_id:
      type: integer
      description: 注音对齐使用的后端 ID；为空或 0 时使用翻译主后端

ExecutionPlanTemplate:
  type: object
  required: [id, name, scope, rounds]
  properties:
    id:
      type: integer
    name:
      type: string
    description:
      type: string
    scope:
      $ref: '#/ExecutionPlanTemplateScope'
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    ruby_retry:
      $ref: '#/ExecutionPlanRubyRetryConfig'
    rounds:
      type: array
      items:
        $ref: '#/ExecutionRoundConfig'
      minItems: 1
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ExecutionPlanTemplateListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/ExecutionPlanTemplate'

CreateExecutionPlanTemplateRequest:
  type: object
  required: [name, rounds]
  properties:
    name:
      type: string
    description:
      type: string
    ruby_retry:
      $ref: '#/ExecutionPlanRubyRetryConfig'
    rounds:
      type: array
      items:
        $ref: '#/ExecutionRoundConfig'
      minItems: 1
  additionalProperties: false

UpdateExecutionPlanTemplateRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    ruby_retry:
      $ref: '#/ExecutionPlanRubyRetryConfig'
    rounds:
      type: array
      items:
        $ref: '#/ExecutionRoundConfig'
      minItems: 1
  additionalProperties: false
