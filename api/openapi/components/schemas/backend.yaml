BackendOptions:
  oneOf:
    - $ref: '#/OpenAIBackendOptions'
    - $ref: '#/AnthropicBackendOptions'
    - $ref: '#/GoogleBackendOptions'
  discriminator:
    propertyName: type
    mapping:
      openai: '#/OpenAIBackendOptions'
      anthropic: '#/AnthropicBackendOptions'
      google: '#/GoogleBackendOptions'

Backend:
  type: object
  required: [id, scope, name, type]
  properties:
    id:
      type: integer
    scope:
      type: string
      enum: [user, org]
    name:
      type: string
    type:
      type: string
      enum: [openai, anthropic, google]
    options:
      $ref: '#/BackendOptions'
    rate_limit_per_minute:
      type: integer
      minimum: 0
      default: 0
      description: 每分钟请求限制；0 表示不限速
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer

BackendListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Backend'

CreateBackendRequest:
  type: object
  required: [name, type, options]
  properties:
    name:
      type: string
    type:
      type: string
      enum: [openai, anthropic, google]
    options:
      $ref: '#/BackendOptions'
    rate_limit_per_minute:
      type: integer
      minimum: 0
      default: 0
      description: 每分钟请求限制；0 表示不限速
  additionalProperties: false

UpdateBackendRequest:
  type: object
  required: [name, type, options]
  properties:
    name:
      type: string
    type:
      type: string
      enum: [openai, anthropic, google]
    options:
      $ref: '#/BackendOptions'
    rate_limit_per_minute:
      type: integer
      minimum: 0
      default: 0
      description: 每分钟请求限制；0 表示不限速
  additionalProperties: false
