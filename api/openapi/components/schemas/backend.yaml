ResponseFormat:
  type: string
  enum: [json_schema, json_object, text, none]
  default: json_schema
  description: |
    响应格式：
    - json_schema: 强制结构化 JSON 输出（推荐）
    - json_object: 自由 JSON 对象
    - text: 纯文本
    - none: 不约束格式

OpenAIBackendOptions:
  type: object
  required: [api_key, type, model]
  description: OpenAI 兼容后端选项。支持 OpenAI 官方 API 及 Azure OpenAI、Ollama、LM Studio 等兼容服务。
  properties:
    type:
      type: string
    api_key:
      type: string
      description: AI 服务 API 密钥
    base_url:
      type: string
      description: |
        自定义API端点URL。留空使用默认值。
        可用于指向 Azure OpenAI / Ollama / LM Studio / 自定义网关等兼容服务。
    model:
      type: string
      minLength: 1
      description: 模型名称（必填）。须为所选服务实际可用的模型 ID。
    max_tokens:
      type: integer
      minimum: 0
      default: 0
      description: 最大生成 token 数。0 表示不限制。
    timeout:
      type: integer
      minimum: 0
      default: 60
      description: 请求超时时间（秒）。0 表示不限制。
    response_format:
      $ref: '#/ResponseFormat'
    temperature:
      type: number
      format: double
      minimum: 0
      maximum: 2
      description: |
        采样温度，控制输出的随机性。
        - 不设置: 使用 API 默认值（通常为 1.0）
        - 0: 确定性输出（greedy decoding）
        - 0.1-0.3: 翻译任务推荐范围
        - 0.7-1.0: 创意写作
    top_p:
      type: number
      format: double
      minimum: 0
      maximum: 1
      description: |
        核采样参数，控制采样多样性。
        - 不设置: 使用 API 默认值（通常为 1.0）
        - 1.0: 不限制
        - 0.9: 仅考虑累积概率前 90% 的 token
    stream:
      type: boolean
      default: false
      description: |
        设为 true 时以流式发起请求并在内部累积为完整响应后返回，
        适用于只接受 stream:true 的兼容网关。默认 false。

AnthropicBackendOptions:
  type: object
  required: [api_key, type, model]
  description: Anthropic Claude 后端选项。
  properties:
    type:
      type: string
    api_key:
      type: string
      description: AI 服务 API 密钥
    base_url:
      type: string
      description: |
        自定义API端点URL。留空使用默认值。
    model:
      type: string
      minLength: 1
      description: 模型名称（必填）。须为 Anthropic 实际可用的模型 ID。
    max_tokens:
      type: integer
      minimum: 1
      default: 8192
      description: 最大生成 token 数。Anthropic 必填，默认 8192。
    timeout:
      type: integer
      minimum: 0
      default: 60
      description: 请求超时时间（秒）。0 表示不限制。
    response_format:
      $ref: '#/ResponseFormat'
    temperature:
      type: number
      format: double
      minimum: 0
      maximum: 1
      description: |
        采样温度，控制输出的随机性。
        - 不设置: 使用 API 默认值（通常为 1.0）
        - 0: 确定性输出
        - 0.1-0.3: 翻译任务推荐范围
        - Anthropic范围限制为0-1
    top_p:
      type: number
      format: double
      minimum: 0
      maximum: 1
      description: |
        核采样参数，控制采样多样性。
        - 不设置: 使用 API 默认值（通常为 1.0）
        - 1.0: 不限制
    enable_prompt_cache:
      type: boolean
      default: true
      description: |
        启用提示缓存（Prompt Caching）。
        启用后，system prompt会被标记为ephemeral缓存断点，
        可显著降低重复翻译任务的token消耗和延迟。
    stream:
      type: boolean
      default: false
      description: |
        设为 true 时以流式发起请求并在内部累积为完整响应后返回，
        适用于只接受 stream:true 的兼容网关。默认 false。

