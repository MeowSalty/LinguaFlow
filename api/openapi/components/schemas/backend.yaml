Backend:
  type: object
  required: [id, scope, name, type]
  properties:
    id:
      type: integer
    scope:
      type: string
      enum: [user, org]
    name:
      type: string
    type:
      type: string
      enum: [openai, anthropic, google]
    options:
      type: object
      additionalProperties: true
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer

BackendListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Backend'

CreateBackendRequest:
  type: object
  required: [name, type]
  properties:
    name:
      type: string
    type:
      type: string
      enum: [openai, anthropic, google]
    options:
      type: object
      additionalProperties: true
  additionalProperties: false

UpdateBackendRequest:
  type: object
  required: [name, type]
  properties:
    name:
      type: string
    type:
      type: string
      enum: [openai, anthropic, google]
    options:
      type: object
      additionalProperties: true
  additionalProperties: false
