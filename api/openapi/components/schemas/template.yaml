TemplateScope:
  type: string
  enum: [user, org, system]

TemplateSplitConfig:
  type: object
  required: [enabled, strategy, max_chars]
  properties:
    enabled:
      type: boolean
    strategy:
      type: string
    max_chars:
      type: integer
      minimum: 1

TemplateProtectConfig:
  type: object
  required: [enabled]
  properties:
    enabled:
      type: boolean
    rules:
      type: array
      items:
        type: string

TemplateRetryConfig:
  type: object
  required: [max_attempts, backoff_ms, jitter]
  properties:
    max_attempts:
      type: integer
      minimum: 1
    backoff_ms:
      type: integer
      minimum: 0
    jitter:
      type: boolean

TemplateRepairConfig:
  type: object
  required: [enabled, json_structural, schema_aliases, partial, partial_threshold, placeholder_normalize, prompt_upgrade]
  properties:
    enabled:
      type: boolean
    json_structural:
      type: boolean
    schema_aliases:
      type: boolean
    partial:
      type: boolean
    partial_threshold:
      type: number
      format: double
      minimum: 0
      maximum: 1
      exclusiveMaximum: true
    placeholder_normalize:
      type: boolean
    prompt_upgrade:
      type: boolean

TemplatePostprocessConfig:
  type: object
  required: [enabled, trim_spaces]
  properties:
    enabled:
      type: boolean
    trim_spaces:
      type: boolean

TemplatePipelineConfig:
  type: object
  required: [split, protect, retry, repair, postprocess]
  properties:
    split:
      $ref: '#/TemplateSplitConfig'
    protect:
      $ref: '#/TemplateProtectConfig'
    retry:
      $ref: '#/TemplateRetryConfig'
    repair:
      $ref: '#/TemplateRepairConfig'
    postprocess:
      $ref: '#/TemplatePostprocessConfig'

TemplateBootstrapConfig:
  type: object
  required: [mode, save, max_terms_per_batch, min_source_len, inline_conflict_strategy]
  properties:
    mode:
      type: string
      enum: [off, pre, inline]
    save:
      type: boolean
    max_terms_per_batch:
      type: integer
      minimum: 1
    min_source_len:
      type: integer
      minimum: 1
    inline_conflict_strategy:
      type: string
      enum: [off, rewrite-local]

TemplateGlossaryConfig:
  type: object
  required: [enabled, bootstrap]
  properties:
    enabled:
      type: boolean
    bootstrap:
      $ref: '#/TemplateBootstrapConfig'

Template:
  type: object
  required: [id, name, description, scope, pipeline, glossary]
  properties:
    id:
      type: integer
      description: 模板 ID。正数为用户模板，负数为内置模板。
    name:
      type: string
    description:
      type: string
    scope:
      $ref: '#/TemplateScope'
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    system_prompt_content:
      type: string
      description: 内联提示词内容，空则使用内置默认模板。风格/受众等翻译要求直接写在提示词中。
    pipeline:
      $ref: '#/TemplatePipelineConfig'
    glossary:
      $ref: '#/TemplateGlossaryConfig'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TemplateListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Template'

CreateTemplateRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string
    system_prompt_content:
      type: string
      description: 内联提示词内容，空则使用内置默认模板。风格/受众等翻译要求直接写在提示词中。
    pipeline:
      $ref: '#/TemplatePipelineConfig'
    glossary:
      $ref: '#/TemplateGlossaryConfig'
  additionalProperties: false

UpdateTemplateRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    system_prompt_content:
      type: string
      description: 内联提示词内容，空则使用内置默认模板。风格/受众等翻译要求直接写在提示词中。
    pipeline:
      $ref: '#/TemplatePipelineConfig'
    glossary:
      $ref: '#/TemplateGlossaryConfig'
  additionalProperties: false

CopyTemplateRequest:
  type: object
  properties:
    name:
      type: string
      description: 新模板名称，留空则自动在原名后加"(副本)"
  additionalProperties: false
