TranslationProfileScope:
  type: string
  enum: [user, org, system]

ProfileRubyConfig:
  type: object
  required: [enabled]
  properties:
    enabled:
      type: boolean
    preserve_kinds:
      type: array
      items:
        type: string
        enum: [phonetic, semantic, creative]
      default: [phonetic, semantic, creative]
      description: 保留的注音分类列表

ProfileProtectConfig:
  type: object
  required: [enabled]
  properties:
    enabled:
      type: boolean
    rules:
      type: array
      items:
        type: string
        enum: [code, link, placeholder, xml]

ProfilePostprocessConfig:
  type: object
  required: [enabled, trim_spaces]
  properties:
    enabled:
      type: boolean
    trim_spaces:
      type: boolean

ProfileRepairConfig:
  type: object
  required: [enabled, json_structural, schema_aliases, partial, partial_threshold, placeholder_normalize, prompt_upgrade]
  properties:
    enabled:
      type: boolean
    json_structural:
      type: boolean
    schema_aliases:
      type: boolean
    partial:
      type: boolean
    partial_threshold:
      type: number
      format: double
      minimum: 0
      maximum: 1
    placeholder_normalize:
      type: boolean
    prompt_upgrade:
      type: boolean

ProfileBootstrapConfig:
  type: object
  required: [enabled, max_terms_per_1000_chars, min_source_len, inline_conflict_strategy]
  properties:
    enabled:
      type: boolean
      default: false
      description: 是否启用内联自举
    max_terms_per_1000_chars:
      type: number
      format: double
      minimum: 0
      description: 每 1000 源文字符（rune）最多抽取的术语条数（缩放系数）
    min_source_len:
      type: integer
      minimum: 1
      description: 内联自举术语源文最短字符数
    inline_conflict_strategy:
      type: string
      enum: [off, rewrite-local]
      description: 并发术语冲突处理策略

ProfileGlossaryConfig:
  type: object
  required: [bootstrap]
  properties:
    bootstrap:
      $ref: '#/ProfileBootstrapConfig'

ProfileContextConfig:
  type: object
  required: [enabled, before, after, max_chars]
  properties:
    enabled:
      type: boolean
      default: true
      description: 是否启用上下文窗口
    before:
      type: integer
      minimum: 0
      default: 1
      description: 上下文取前 N 段
    after:
      type: integer
      minimum: 0
      default: 1
      description: 上下文取后 N 段
    max_chars:
      type: integer
      minimum: 0
      default: 0
      description: 每个上下文段落的字符数上限，0 表示不限制

ProfileQAConfig:
  type: object
  required: [enabled]
  properties:
    enabled:
      type: boolean
      default: false
      description: 是否启用翻译质量检测
    auto_reject:
      type: boolean
      default: false
      description: error 级别问题自动 reject
    length_method:
      type: string
      enum: [char_weight, word_count]
      default: char_weight
      description: "长度计算方式。char_weight: CJK 字符×2 拉丁字符×1；word_count: CJK 每字 1 词拉丁每词 1 词"
    length_ratio_min:
      type: number
      format: double
      minimum: 0
      default: 0
      description: "译文/原文最短长度比，0 表示不检测"
    length_ratio_max:
      type: number
      format: double
      minimum: 0
      default: 0
      description: "译文/原文最长长度比，0 表示不检测"

TranslationProfileConfig:
  type: object
  required: [protect, postprocess, repair, glossary, context]
  properties:
    protect:
      $ref: '#/ProfileProtectConfig'
    ruby:
      $ref: '#/ProfileRubyConfig'
    postprocess:
      $ref: '#/ProfilePostprocessConfig'
    repair:
      $ref: '#/ProfileRepairConfig'
    glossary:
      $ref: '#/ProfileGlossaryConfig'
    context:
      $ref: '#/ProfileContextConfig'
    qa:
      $ref: '#/ProfileQAConfig'

TranslationProfile:
  type: object
  required: [id, name, description, scope, config]
  properties:
    id:
      type: integer
    name:
      type: string
    description:
      type: string
    scope:
      $ref: '#/TranslationProfileScope'
    owner_user_id:
      type: integer
    owner_org_id:
      type: integer
    config:
      $ref: '#/TranslationProfileConfig'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TranslationProfileListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/TranslationProfile'

CreateTranslationProfileRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string
    config:
      $ref: '#/TranslationProfileConfig'
  additionalProperties: false

UpdateTranslationProfileRequest:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    config:
      $ref: '#/TranslationProfileConfig'
  additionalProperties: false
