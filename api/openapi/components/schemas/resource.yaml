Resource:
  type: object
  required: [id, path, name, directory, format, total_segments, status, created_at, updated_at]
  properties:
    id:
      type: integer
    path:
      type: string
      description: 项目内规范化资源相对路径，使用 / 分隔，例如 ui/common.json
    name:
      type: string
      description: 资源显示名，当前等同于资源路径 basename，预留给后续可编辑显示名
    directory:
      type: string
      description: 资源所在目录，根目录为空字符串
    format:
      type: string
    total_segments:
      type: integer
    status:
      type: string
      enum: [ready, error]
    error_message:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ResourceUploadFileResult:
  type: object
  required: [path, action]
  properties:
    path:
      type: string
      description: 资源项目内规范化相对路径
    action:
      type: string
      enum: [created, conflict, failed]
      description: 处理结果：created=创建成功，conflict=与已有资源冲突，failed=处理失败
    resource:
      $ref: '#/Resource'
      description: 创建成功时返回新资源
    existing_resource:
      $ref: '#/Resource'
      description: 冲突时返回已有资源
    error:
      type: string
      description: 失败时的错误信息

ResourceUploadBatchResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/ResourceUploadFileResult'

ResourceListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/Resource'

ResourceTreeNode:
  type: object
  required: [type, name, path]
  properties:
    type:
      type: string
      enum: [directory, resource]
    name:
      type: string
    path:
      type: string
      description: 目录或资源的项目内规范化相对路径，根目录为空字符串
    resource:
      $ref: '#/Resource'
    children:
      type: array
      items:
        $ref: '#/ResourceTreeNode'

ResourceTreeResponse:
  type: object
  required: [root]
  properties:
    root:
      $ref: '#/ResourceTreeNode'

ResourceSegment:
  allOf:
    - $ref: '../schemas/job.yaml#/Segment'

ResourceSegmentListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '../schemas/job.yaml#/Segment'
    next_cursor:
      type: string

ResourceSegmentUpdateRequest:
  type: object
  properties:
    source_text:
      type: string
    target_text:
      type: string
    comment:
      type: string
  additionalProperties: false

SegmentReviewRequest:
  type: object
  required: [action]
  properties:
    action:
      type: string
      enum: [approve, reject, edit]
      description: 审核操作：approve=通过，reject=拒绝，edit=编辑译文
    target_text:
      type: string
      description: 编辑译文时必填
    comment:
      type: string
      description: 审核备注

BatchReviewRequest:
  type: object
  required: [segment_ids, action]
  properties:
    segment_ids:
      type: array
      items:
        type: integer
      minItems: 1
      description: 待审核的段落 ID 列表
    action:
      type: string
      enum: [approve, reject]
      description: 批量审核操作
    comment:
      type: string
      description: 审核备注

BatchReviewResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '../schemas/job.yaml#/Segment'

ApproveAllResponse:
  type: object
  required: [approved_count]
  properties:
    approved_count:
      type: integer
      description: 批准的段落数

RetranslateResponse:
  type: object
  required: [reset_count]
  properties:
    reset_count:
      type: integer
      description: 重置为待翻译的段落数

IncrementalUpdateChanges:
  type: object
  required: [added, updated, unchanged, deleted]
  properties:
    added:
      type: integer
      description: 新增段落数
    updated:
      type: integer
      description: 源文本变化的段落数
    unchanged:
      type: integer
      description: 未变化的段落数
    deleted:
      type: integer
      description: 删除的段落数

IncrementalUpdateResponse:
  type: object
  required: [resource, changes]
  properties:
    resource:
      $ref: '#/Resource'
    changes:
      $ref: '#/IncrementalUpdateChanges'

ResourceConflictResponse:
  type: object
  required: [existing_resource]
  properties:
    existing_resource:
      $ref: '#/Resource'

ResourcePrecheckFileResult:
  type: object
  required: [path, action]
  properties:
    path:
      type: string
      description: 资源项目内规范化相对路径
    action:
      type: string
      enum: [create, conflict, duplicate]
      description: 建议操作：create=可直接创建，conflict=与已有资源冲突，duplicate=批次内重复路径
    existing_resource:
      $ref: '#/Resource'
      description: 冲突时返回已有资源信息

ResourcePrecheckBatchResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/ResourcePrecheckFileResult'
