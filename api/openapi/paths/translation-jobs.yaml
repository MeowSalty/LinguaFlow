projectTranslationJobs:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
  get:
    operationId: ListTranslationJobs
    summary: 列出项目翻译任务
    security:
      - bearerAuth: []
    parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [pending, running, completed, failed, cancelled]
      - name: trigger_type
        in: query
        required: false
        schema:
          type: string
          enum: [manual, file_update, glossary_change, web_edit]
      - $ref: '../base.yaml#/components/parameters/Cursor'
      - $ref: '../base.yaml#/components/parameters/Limit'
    responses:
      '200':
        description: 翻译任务列表
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/TranslationJobListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  post:
    operationId: CreateTranslationJob
    summary: 创建翻译任务
    security:
      - bearerAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/CreateTranslationJobRequest'
    responses:
      '202':
        description: 任务已创建
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/TranslationJob'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

translationJobById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/TranslationJobId'
  get:
    operationId: GetTranslationJob
    summary: 获取翻译任务详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 任务详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/TranslationJob'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

translationJobCancel:
  parameters:
    - $ref: '../base.yaml#/components/parameters/TranslationJobId'
  post:
    operationId: CancelTranslationJob
    summary: 取消翻译任务
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 取消后的任务
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/TranslationJob'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

translationJobRetry:
  parameters:
    - $ref: '../base.yaml#/components/parameters/TranslationJobId'
  post:
    operationId: RetryTranslationJob
    summary: 重试失败的资源翻译
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 重试后的任务
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/TranslationJob'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

