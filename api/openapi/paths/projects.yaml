projects:
  post:
    operationId: CreateProject
    summary: 创建项目
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/project.yaml#/CreateProjectRequest'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/project.yaml#/Project'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  get:
    operationId: ListProjects
    summary: 列出项目
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 项目列表
        content:
          application/json:
            schema:
              $ref: '../components/schemas/project.yaml#/ProjectListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
  get:
    operationId: GetProject
    summary: 获取项目详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 项目详情
        content:
          application/json:
            schema:
              $ref: '../components/schemas/project.yaml#/Project'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  put:
    operationId: UpdateProject
    summary: 更新项目
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/project.yaml#/UpdateProjectRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/project.yaml#/Project'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  delete:
    operationId: DeleteProject
    summary: 删除项目
    security:
      - bearerAuth: []
    responses:
      '204':
        description: 删除成功
      default:
        $ref: '../base.yaml#/components/responses/Problem'

