ping:
  get:
    operationId: Ping
    summary: 无鉴权连通测试
    description: 用于前端在登录前快速判断后端 HTTP 服务是否可达；不检查数据库或第三方依赖。
    responses:
      '200':
        description: 服务可达
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/HealthResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
