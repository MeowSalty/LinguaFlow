projectResources:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
  get:
    operationId: ListProjectResources
    summary: 列出项目资源文件
    security:
      - bearerAuth: []
    parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
      - name: search
        in: query
        required: false
        schema:
          type: string
      - $ref: '../base.yaml#/components/parameters/Cursor'
      - $ref: '../base.yaml#/components/parameters/Limit'
    responses:
      '200':
        description: 资源列表
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ResourceListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  post:
    operationId: UploadProjectResources
    summary: 上传资源文件到项目
    description: |
      批量上传资源文件，允许部分成功。
      - files 与 paths 按数组下标一一对应
      - paths 使用 / 分隔，例如 ui/common.json、admin/common.json
      - 未提供 paths 时兼容旧客户端，使用上传文件名作为根目录资源路径
      - 项目内资源唯一性以规范化 path 判断，而不是 filename
      - 冲突或失败的文件不会阻断其他文件的上传，每个文件独立返回处理结果
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [files]
            properties:
              files:
                type: array
                maxItems: 50
                items:
                  type: string
                  format: binary
              paths:
                type: array
                description: 与 files 一一对应的项目内资源相对路径；省略时使用文件名作为根目录路径
                items:
                  type: string
    responses:
      '200':
        description: 批量上传结果（可能包含部分冲突或失败）
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ResourceUploadBatchResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourcePrecheck:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
  post:
    operationId: PrecheckProjectResources
    summary: 上传资源预检
    description: |
      在实际上传前检查批量文件中的冲突情况，不执行任何写入操作。
      - 检查批次内是否有重复路径
      - 检查每个路径是否与项目已有资源冲突
      - 返回每个文件的建议操作（create / conflict / duplicate）
      - 前端可根据结果让用户确认冲突处理策略后再执行实际上传
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [paths]
            properties:
              paths:
                type: array
                minItems: 1
                maxItems: 50
                items:
                  type: string
                description: 待检查的项目内资源相对路径列表（不包含实际文件）
    responses:
      '200':
        description: 预检结果
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ResourcePrecheckBatchResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceTree:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
  get:
    operationId: GetProjectResourceTree
    summary: 获取项目资源目录树
    description: |
      按资源 path 聚合生成目录树。当前目录为虚拟节点，资源身份仍由 Resource.path 唯一确定；后续可在此基础上扩展目录移动、重命名等能力。
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 资源目录树
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ResourceTreeResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  get:
    operationId: GetResource
    summary: 获取资源详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 资源详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Resource'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  put:
    operationId: UpdateResource
    summary: 更新资源文件
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Resource'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  post:
    operationId: IncrementalUpdateResource
    summary: 增量更新资源文件
    description: |
      上传新版本文件，系统自动对比段落变化：
      - 相同源文本的段落保留已有译文
      - 源文本变化的段落重置为待翻译
      - 新增段落状态为待翻译
      - 不再存在的段落将被删除
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
    responses:
      '200':
        description: 增量更新成功
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/IncrementalUpdateResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  delete:
    operationId: DeleteResource
    summary: 删除资源文件及其所有段落
    security:
      - bearerAuth: []
    responses:
      '204':
        description: 删除成功
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceDownload:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  get:
    operationId: DownloadResourceFile
    summary: 下载资源原始文件
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 资源原始文件
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceDownloadTranslated:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  get:
    operationId: DownloadTranslatedResourceFile
    summary: 下载资源的翻译结果文件
    description: |
      基于资源当前所有已翻译/已编辑的 segments，渲染并下载翻译后的文件。
      不依赖翻译任务状态，直接读取资源级别的最新翻译数据。
      如果没有任何已翻译的段落，返回 409 Conflict。
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 翻译结果文件
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceSegments:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  get:
    operationId: ListResourceSegments
    summary: 列出资源段落
    security:
      - bearerAuth: []
    parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [pending, translated, edited, approved, rejected]
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: group_key
        in: query
        required: false
        schema:
          type: string
        description: 按分组键过滤 segments（如 epub_file 路径），仅返回属于指定分组的 segments
      - $ref: '../base.yaml#/components/parameters/Cursor'
      - $ref: '../base.yaml#/components/parameters/Limit'
    responses:
      '200':
        description: 段落列表
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ResourceSegmentListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceSegmentById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
    - $ref: '../base.yaml#/components/parameters/SegmentId'
  patch:
    operationId: UpdateResourceSegment
    summary: 更新资源段落内容
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/ResourceSegmentUpdateRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Segment'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceSegmentReview:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
    - $ref: '../base.yaml#/components/parameters/SegmentId'
  patch:
    operationId: ReviewResourceSegment
    summary: 审核单个段落（通过/拒绝/编辑）
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/SegmentReviewRequest'
    responses:
      '200':
        description: 审核成功
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Segment'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceSegmentsBatchReview:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  post:
    operationId: BatchReviewResourceSegments
    summary: 批量审核段落
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/BatchReviewRequest'
    responses:
      '200':
        description: 批量审核结果
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/BatchReviewResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceSegmentsApproveAll:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  post:
    operationId: ApproveAllResourceSegments
    summary: 批准资源中所有已翻译/已编辑的段落
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 批准结果
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ApproveAllResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceRetranslateRejected:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  post:
    operationId: RetranslateRejectedSegments
    summary: 将资源中被拒绝的段落重置为待翻译
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 重置结果
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/RetranslateResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

projectResourceSegmentGroups:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
    - $ref: '../base.yaml#/components/parameters/ResourceId'
  get:
    operationId: ListResourceSegmentGroups
    summary: 列出资源段落分组（按章节）
    description: |
      按 meta.epub_file 将 segments 归为章节组，返回每组的统计信息。
      适用于 EPUB 等多章节资源的分组展示。
      非 EPUB 资源会返回一个包含所有 segments 的单一组。
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 段落分组列表
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/ResourceSegmentGroupListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
