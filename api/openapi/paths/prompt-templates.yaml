promptTemplates:
  get:
    operationId: ListPromptTemplates
    summary: 列出当前用户的翻译提示词模板
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 翻译提示词模板列表
        content:
          application/json:
            schema:
              $ref: '../components/schemas/prompt-template.yaml#/TranslationPromptTemplateListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  post:
    operationId: CreatePromptTemplate
    summary: 创建翻译提示词模板
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/prompt-template.yaml#/CreateTranslationPromptTemplateRequest'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/prompt-template.yaml#/TranslationPromptTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

promptTemplateById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/TranslationPromptTemplateId'
  get:
    operationId: GetPromptTemplate
    summary: 获取翻译提示词模板详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 翻译提示词模板详情
        content:
          application/json:
            schema:
              $ref: '../components/schemas/prompt-template.yaml#/TranslationPromptTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  put:
    operationId: UpdatePromptTemplate
    summary: 更新翻译提示词模板
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/prompt-template.yaml#/UpdateTranslationPromptTemplateRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/prompt-template.yaml#/TranslationPromptTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  delete:
    operationId: DeletePromptTemplate
    summary: 删除翻译提示词模板
    security:
      - bearerAuth: []
    responses:
      '204':
        description: 删除成功
      default:
        $ref: '../base.yaml#/components/responses/Problem'
