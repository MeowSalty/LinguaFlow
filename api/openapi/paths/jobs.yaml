projectJobs:
  parameters:
    - $ref: '../base.yaml#/components/parameters/ProjectId'
  post:
    operationId: CreateProjectJob
    summary: 创建多文件翻译任务
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [files]
            properties:
              files:
                type: array
                items:
                  type: string
                  format: binary
              source_lang:
                type: string
              target_lang:
                type: string
    responses:
      '202':
        description: 任务已创建
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/JobCreateResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  get:
    operationId: GetJob
    summary: 获取任务详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 任务详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Job'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobSubJobs:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  get:
    operationId: ListJobSubJobs
    summary: 获取任务子任务列表
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 子任务列表
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/SubJobListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobSubJobById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
    - $ref: '../base.yaml#/components/parameters/SubJobId'
  get:
    operationId: GetJobSubJob
    summary: 获取单个子任务详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 子任务详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/SubJob'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobCancel:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  post:
    operationId: CancelJob
    summary: 取消任务
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 取消后的任务
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Job'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobRetry:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  post:
    operationId: RetryJob
    summary: 重试失败子任务
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 重试后的任务
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Job'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobDownload:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  get:
    operationId: DownloadJobResult
    summary: 下载任务输出
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 下载结果文件
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      default:
        $ref: '../base.yaml#/components/responses/Problem'
