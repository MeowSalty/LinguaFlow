templates:
  get:
    operationId: ListTemplates
    summary: 列出当前用户可见的所有模板
    description: 返回内置模板、用户自有模板及用户所属组织的模板
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 模板列表
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TemplateListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  post:
    operationId: CreateTemplate
    summary: 创建用户级自定义模板
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/translation-template.yaml#/CreateTemplateRequest'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TranslationTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

templateById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/TemplateId'
  get:
    operationId: GetTemplate
    summary: 获取模板详情
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 模板详情
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TranslationTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  put:
    operationId: UpdateTemplate
    summary: 更新模板（仅 owner 可操作）
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/translation-template.yaml#/UpdateTemplateRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TranslationTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  delete:
    operationId: DeleteTemplate
    summary: 删除模板（内置模板不可删除）
    security:
      - bearerAuth: []
    responses:
      '204':
        description: 删除成功
      default:
        $ref: '../base.yaml#/components/responses/Problem'

orgTemplates:
  parameters:
    - $ref: '../base.yaml#/components/parameters/OrgId'
  get:
    operationId: ListOrgTemplates
    summary: 列出组织级模板
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 组织模板列表
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TemplateListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  post:
    operationId: CreateOrgTemplate
    summary: 创建组织级模板
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/translation-template.yaml#/CreateTemplateRequest'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TranslationTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

orgTemplateById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/OrgId'
    - $ref: '../base.yaml#/components/parameters/TemplateId'
  put:
    operationId: UpdateOrgTemplate
    summary: 更新组织级模板
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/translation-template.yaml#/UpdateTemplateRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/translation-template.yaml#/TranslationTemplate'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
  delete:
    operationId: DeleteOrgTemplate
    summary: 删除组织级模板
    security:
      - bearerAuth: []
    responses:
      '204':
        description: 删除成功
      default:
        $ref: '../base.yaml#/components/responses/Problem'
