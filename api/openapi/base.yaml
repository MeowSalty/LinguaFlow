openapi: 3.0.3
info:
  title: LinguaFlow Web Service API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /ping:
    $ref: './paths/system.yaml#/ping'
  /auth/register:
    $ref: './paths/auth.yaml#/register'
  /auth/login:
