  /auth/refresh:
    $ref: './paths/auth.yaml#/refresh'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /users/me:
    $ref: './paths/users.yaml#/currentUser'
  /users/me/password:
    $ref: './paths/users.yaml#/currentUserPassword'
  /orgs:
    $ref: './paths/organizations.yaml#/organizations'
  /orgs/{orgId}:
    $ref: './paths/organizations.yaml#/organizationById'
