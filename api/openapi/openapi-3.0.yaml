info:
    title: LinguaFlow Web Service API
    version: 0.1.0
openapi: 3.0.3
paths:
    /activity:
        get:
            operationId: ListActivity
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_job_ActivityListResponse'
                    description: 活动审计日志
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 获取活动审计日志
        parameters:
            - $ref: '#/components/parameters/components_parameters_extra_Cursor'
            - $ref: '#/components/parameters/components_parameters_extra_Limit'
    /auth/login:
        post:
            operationId: LoginAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_LoginRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_auth_AuthSession'
                    description: 登录成功
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            summary: 用户登录
    /auth/logout:
        post:
            operationId: LogoutAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_LogoutRequest'
                required: true
            responses:
                "204":
                    description: 已登出
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 登出并撤销刷新令牌
    /auth/refresh:
        post:
            operationId: RefreshAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_RefreshRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_auth_AuthSession'
                    description: 刷新成功
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            summary: 刷新访问令牌
    /auth/register:
        post:
            operationId: RegisterAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_RegisterRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_auth_AuthSession'
                    description: 已创建
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            summary: 注册用户并签发会话
    /jobs/{jobId}:
        get:
            operationId: GetJob
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_job_Job'
                    description: 任务详情
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 获取任务详情
        parameters:
            - $ref: '#/components/parameters/components_parameters_JobId'
    /jobs/{jobId}/approve:
        parameters:
            - $ref: '#/components/parameters/components_parameters_JobId'
        post:
            operationId: ApproveJob
            responses:
                "200":
                    content:
                        application/json:
                            schema:
