    UpdateTranslationProfileRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        config:
          $ref: '#/components/schemas/TranslationProfileConfig'
      additionalProperties: false
    ExecutionPlanTemplate:
      type: object
      required:
        - id
        - name
        - scope
        - rounds
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        scope:
          $ref: '#/components/schemas/ExecutionPlanTemplateScope'
        owner_user_id:
          type: integer
        owner_org_id:
          type: integer
        bootstrap:
          $ref: '#/components/schemas/ExecutionPlanBootstrapConfig'
        ruby_retry:
          $ref: '#/components/schemas/ExecutionPlanRubyRetryConfig'
        rounds:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionRoundConfig'
          minItems: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ExecutionPlanTemplateListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionPlanTemplate'
    CreateExecutionPlanTemplateRequest:
      type: object
      required:
        - name
        - rounds
      properties:
        name:
          type: string
        description:
          type: string
        bootstrap:
          $ref: '#/components/schemas/ExecutionPlanBootstrapConfig'
        ruby_retry:
          $ref: '#/components/schemas/ExecutionPlanRubyRetryConfig'
        rounds:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionRoundConfig'
          minItems: 1
      additionalProperties: false
    UpdateExecutionPlanTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        bootstrap:
          $ref: '#/components/schemas/ExecutionPlanBootstrapConfig'
        ruby_retry:
          $ref: '#/components/schemas/ExecutionPlanRubyRetryConfig'
        rounds:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionRoundConfig'
          minItems: 1
      additionalProperties: false
    IncrementalUpdateChanges:
      type: object
      required:
        - added
        - updated
        - unchanged
        - deleted
      properties:
        added:
          type: integer
          description: 新增段落数
        updated:
          type: integer
          description: 源文本变化的段落数
        unchanged:
          type: integer
          description: 未变化的段落数
        deleted:
          type: integer
          description: 删除的段落数
    GlossarySyncImpactResource:
      type: object
      required:
        - resource_id
        - resource_path
        - affected_count
      properties:
        resource_id:
          type: integer
        resource_path:
          type: string
        affected_count:
          type: integer
    GlossarySyncExecuteResourceResult:
      type: object
      required:
        - resource_id
        - resource_path
        - updated_count
        - skipped_count
      properties:
        resource_id:
          type: integer
        resource_path:
          type: string
        updated_count:
          type: integer
        skipped_count:
          type: integer
    ExecutionPlanTemplateScope:
      type: string
      enum:
        - user
        - org
        - system
    ExecutionPlanBootstrapConfig:
      type: object
      required:
        - enabled
        - backend_id
        - prompt_template_id
        - batch_size
        - concurrency
      properties:
        enabled:
          type: boolean
          default: false
          description: 是否启用独立自举
        backend_id:
          type: integer
          description: 自举使用的后端 ID
        prompt_template_id:
          type: integer
          description: 自举使用的提示词模板 ID（仅用其 bootstrap_prompt_content）
        batch_size:
          type: integer
          minimum: 1
          default: 20
          description: 每批发送给 LLM 的源文段数
        concurrency:
          type: integer
          minimum: 1
          default: 2
          description: 自举并发数
        max_terms_per_batch:
          type: integer
          minimum: 1
          default: 20
          description: 每批最多抽取的术语数
        min_source_len:
          type: integer
          minimum: 1
          default: 2
          description: 术语源文最短字符数
    ExecutionPlanRubyRetryConfig:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          default: false
          description: 是否启用注音对齐重试
        backend_id:
          type: integer
          description: 注音对齐使用的后端 ID；为空或 0 时使用翻译主后端
    RetryConfig:
      type: object
      properties:
        max_attempts:
          type: integer
          minimum: 1
          default: 3
        backoff_ms:
          type: integer
          minimum: 0
          default: 2000
        jitter:
          type: boolean
          default: true
    ExecutionRoundConfig:
      type: object
      required:
        - backend_id
        - prompt_template_id
        - profile_id
        - batch_size
        - concurrency
      properties:
        name:
          type: string
          description: 轮次名称（可选，空值自动生成 round-N）
        backend_id:
          type: integer
          description: 后端 ID（Backend 单表全局唯一）
        prompt_template_id:
          type: integer
          description: 提示词模板 ID（PromptTemplate 单表全局唯一）
        profile_id:
          type: integer
          description: 策略模板 ID（TranslationProfile 单表全局唯一）
        batch_size:
          type: integer
          minimum: 1
        concurrency:
          type: integer
          minimum: 1
        fallback_shrink:
          type: number
          minimum: 0
          maximum: 1
          default: 0
        rate_limit_per_sec:
          type: integer
          minimum: 0
          default: 0
        retry:
          $ref: '#/components/schemas/RetryConfig'
    PromptTemplateScope:
      type: string
      enum:
        - user
        - org
        - system
    TranslationProfileScope:
      type: string
      enum:
        - user
        - org
        - system
    ProfileSplitConfig:
      type: object
      required:
        - enabled
        - strategy
        - max_chars
      properties:
        enabled:
          type: boolean
        strategy:
          type: string
        max_chars:
          type: integer
          minimum: 1
    ProfileRubyConfig:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        output_format:
          type: string
          enum:
            - ruby_output
            - inline_markers
          default: ruby_output
    ProfileProtectConfig:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        rules:
          type: array
          items:
            type: string
            enum:
              - code
              - link
              - placeholder
              - xml
        ruby:
          $ref: '#/components/schemas/ProfileRubyConfig'
    ProfilePostprocessConfig:
      type: object
      required:
        - enabled
        - trim_spaces
      properties:
        enabled:
          type: boolean
        trim_spaces:
          type: boolean
    ProfileRepairConfig:
      type: object
      required:
        - enabled
        - json_structural
        - schema_aliases
        - partial
        - partial_threshold
        - placeholder_normalize
        - prompt_upgrade
      properties:
        enabled:
          type: boolean
        json_structural:
          type: boolean
        schema_aliases:
          type: boolean
        partial:
          type: boolean
        partial_threshold:
          type: number
          format: double
          minimum: 0
          maximum: 1
        placeholder_normalize:
          type: boolean
        prompt_upgrade:
          type: boolean
    ProfileBootstrapConfig:
      type: object
      required:
        - enabled
        - max_terms_per_1000_chars
        - min_source_len
        - inline_conflict_strategy
      properties:
        enabled:
          type: boolean
          default: false
          description: 是否启用内联自举
        max_terms_per_1000_chars:
          type: number
          format: double
          minimum: 0
          description: 每 1000 源文字符（rune）最多抽取的术语条数（缩放系数）
        min_source_len:
          type: integer
          minimum: 1
          description: 内联自举术语源文最短字符数
        inline_conflict_strategy:
          type: string
          enum:
            - 'off'
            - rewrite-local
          description: 并发术语冲突处理策略
    ProfileGlossaryConfig:
      type: object
      required:
        - bootstrap
      properties:
        bootstrap:
          $ref: '#/components/schemas/ProfileBootstrapConfig'
    TranslationProfileConfig:
      type: object
      required:
        - split
        - protect
        - postprocess
        - repair
        - glossary
      properties:
        split:
          $ref: '#/components/schemas/ProfileSplitConfig'
        protect:
          $ref: '#/components/schemas/ProfileProtectConfig'
        postprocess:
          $ref: '#/components/schemas/ProfilePostprocessConfig'
        repair:
          $ref: '#/components/schemas/ProfileRepairConfig'
        glossary:
          $ref: '#/components/schemas/ProfileGlossaryConfig'
