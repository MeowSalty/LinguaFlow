        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PromptTemplateListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PromptTemplate'
    CreatePromptTemplateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        system_prompt_content:
          type: string
          description: 翻译提示词内容。
        bootstrap_prompt_content:
          type: string
          description: Bootstrap 术语抽取提示词内容。
      additionalProperties: false
    UpdatePromptTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        system_prompt_content:
          type: string
          description: 翻译提示词内容。
        bootstrap_prompt_content:
          type: string
          description: Bootstrap 术语抽取提示词内容。
      additionalProperties: false
    TranslationProfile:
      type: object
      required:
        - id
        - name
        - description
        - scope
        - config
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        scope:
          $ref: '#/components/schemas/TranslationProfileScope'
        owner_user_id:
          type: integer
        owner_org_id:
          type: integer
        config:
          $ref: '#/components/schemas/TranslationProfileConfig'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TranslationProfileListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TranslationProfile'
    CreateTranslationProfileRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        config:
          $ref: '#/components/schemas/TranslationProfileConfig'
