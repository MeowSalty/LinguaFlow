        resource_count:
          type: integer
        completed_resources:
          type: integer
        failed_resources:
          type: integer
        total_segments:
          type: integer
        completed_segments:
          type: integer
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        job_resources:
          type: array
          items:
            $ref: '#/components/schemas/TranslationJobResource'
    TranslationJobListResponse:
