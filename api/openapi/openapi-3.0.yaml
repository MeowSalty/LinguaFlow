components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ResourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    TranslationJobId:
      name: translationJobId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    BackendId:
      name: backendId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    PromptTemplateId:
      name: promptTemplateId
      in: path
      required: true
      schema:
        type: integer
    TranslationProfileId:
      name: translationProfileId
      in: path
      required: true
      schema:
        type: integer
    ExecutionPlanTemplateId:
      name: executionPlanTemplateId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    SegmentId:
      name: segmentId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Problem:
      description: 错误响应
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: linguaflow
    User:
      type: object
      required:
        - id
        - username
        - email
        - role
        - active
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
        active:
          type: boolean
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
