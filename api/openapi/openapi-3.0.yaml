openapi: 3.0.3
info:
  title: LinguaFlow Web Service API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /ping:
    get:
      operationId: Ping
      summary: 无鉴权连通测试
      description: 用于前端在登录前快速判断后端 HTTP 服务是否可达；不检查数据库或第三方依赖。
      responses:
        '200':
          description: 服务可达
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/Problem'
  /auth/register:
    post:
      operationId: RegisterAuth
      summary: 注册用户并签发会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        default:
          $ref: '#/components/responses/Problem'
  /auth/login:
    post:
      operationId: LoginAuth
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        default:
          $ref: '#/components/responses/Problem'
  /auth/refresh:
    post:
      operationId: RefreshAuth
      summary: 刷新访问令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        default:
          $ref: '#/components/responses/Problem'
  /auth/logout:
    post:
      operationId: LogoutAuth
      summary: 登出并撤销刷新令牌
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: 已登出
        default:
          $ref: '#/components/responses/Problem'
  /users/me:
    get:
      operationId: GetCurrentUser
      summary: 获取当前用户
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateCurrentUser
      summary: 更新当前用户资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserRequest'
      responses:
        '200':
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Problem'
  /users/me/password:
    put:
      operationId: ChangeCurrentUserPassword
      summary: 修改当前用户密码
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: 密码已更新
        default:
          $ref: '#/components/responses/Problem'
  /orgs:
    get:
      operationId: ListOrganizations
      summary: 列出当前用户所属组织
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 组织列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: CreateOrganization
      summary: 创建组织
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        '201':
          description: 已创建组织
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      operationId: GetOrganization
      summary: 获取组织详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 组织详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateOrganization
      summary: 更新组织信息
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        '200':
          description: 更新后的组织
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/members:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      operationId: ListOrganizationMembers
      summary: 获取组织成员列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMemberListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: AddOrganizationMember
      summary: 添加组织成员
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrganizationMemberRequest'
      responses:
        '201':
          description: 已添加成员
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/UserId'
    put:
      operationId: UpdateOrganizationMember
      summary: 修改组织成员角色
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationMemberRequest'
      responses:
        '200':
          description: 更新后的成员
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteOrganizationMember
      summary: 移除组织成员
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 已移除成员
        default:
          $ref: '#/components/responses/Problem'
  /backends:
    post:
      operationId: CreateUserBackend
      summary: 创建个人后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackendRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListUserBackends
      summary: 列出个人后端
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 后端列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /backends/{backendId}:
    parameters:
      - $ref: '#/components/parameters/BackendId'
    put:
      operationId: UpdateUserBackend
      summary: 更新个人后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBackendRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteUserBackend
      summary: 删除个人后端
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/backends:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    post:
      operationId: CreateOrgBackend
      summary: 创建组织后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackendRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListOrgBackends
      summary: 列出组织后端
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 后端列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/backends/{backendId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/BackendId'
    put:
      operationId: UpdateOrgBackend
      summary: 更新组织后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBackendRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteOrgBackend
      summary: 删除组织后端
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /projects:
    post:
      operationId: CreateProject
      summary: 创建项目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListProjects
      summary: 列出项目
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: GetProject
      summary: 获取项目详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateProject
      summary: 更新项目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteProject
      summary: 删除项目
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/backends:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: GetProjectBackends
      summary: 获取项目后端设置
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 后端设置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBackendSettings'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: SetProjectBackendOrder
      summary: 设置项目后端顺序
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetBackendOrderRequest'
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectBackendBinding'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: ListProjectResources
      summary: 列出项目资源文件
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - ready
              - processing
              - error
        - name: format
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 资源列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: UploadProjectResources
      summary: 上传资源文件到项目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  maxItems: 50
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceUploadResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: GetResource
      summary: 获取资源详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 资源详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateResource
      summary: 更新资源文件
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteResource
      summary: 删除资源文件及其所有段落
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/download:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: DownloadResourceFile
      summary: 下载资源原始文件
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 资源原始文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/segments:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: ListResourceSegments
      summary: 列出资源段落
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - translated
              - reviewed
              - rejected
        - name: search
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 段落列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSegmentListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/segments/{segmentId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
      - $ref: '#/components/parameters/SegmentId'
    patch:
      operationId: UpdateResourceSegment
      summary: 更新资源段落内容
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceSegmentUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/stages/{stage}/override:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/Stage'
    put:
      operationId: SetStageBackendOverride
      summary: 设置阶段后端覆盖
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStageOverrideRequest'
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StageBackendOverride'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/stages/{stage}/plan:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/Stage'
    get:
      operationId: GetStagePlan
      summary: 查询阶段执行计划
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 阶段执行计划
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectBackendBinding'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/glossary:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: ListGlossaryEntries
      summary: 列出术语条目
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 术语表列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: CreateGlossaryEntry
      summary: 创建术语条目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGlossaryEntryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryEntry'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/glossary/{entryId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/EntryId'
    put:
      operationId: UpdateGlossaryEntry
      summary: 更新术语条目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGlossaryEntryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryEntry'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteGlossaryEntry
      summary: 删除术语条目
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/glossary/import:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      operationId: ImportGlossaryCSV
      summary: CSV 导入术语表
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 导入结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryImportResult'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/glossary/export:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: ExportGlossaryCSV
      summary: CSV 导出术语表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV 文件
          content:
            text/csv:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/translation-jobs:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: ListTranslationJobs
      summary: 列出项目翻译任务
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - running
              - awaiting_review
              - completed
              - failed
              - cancelled
        - name: trigger_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - manual
              - file_update
              - glossary_change
              - web_edit
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 翻译任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationJobListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: CreateTranslationJob
      summary: 创建翻译任务
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationJobRequest'
      responses:
        '202':
          description: 任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationJob'
        default:
          $ref: '#/components/responses/Problem'
  /translation-jobs/{translationJobId}:
    parameters:
      - $ref: '#/components/parameters/TranslationJobId'
    get:
      operationId: GetTranslationJob
      summary: 获取翻译任务详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationJob'
        default:
          $ref: '#/components/responses/Problem'
  /translation-jobs/{translationJobId}/cancel:
    parameters:
      - $ref: '#/components/parameters/TranslationJobId'
    post:
      operationId: CancelTranslationJob
      summary: 取消翻译任务
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 取消后的任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationJob'
        default:
          $ref: '#/components/responses/Problem'
  /translation-jobs/{translationJobId}/retry:
    parameters:
      - $ref: '#/components/parameters/TranslationJobId'
    post:
      operationId: RetryTranslationJob
      summary: 重试失败的资源翻译
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 重试后的任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationJob'
        default:
          $ref: '#/components/responses/Problem'
  /translation-jobs/{translationJobId}/download:
    parameters:
      - $ref: '#/components/parameters/TranslationJobId'
    get:
      operationId: DownloadTranslationJobResult
      summary: 下载翻译任务结果
      security:
        - bearerAuth: []
      parameters:
        - name: resource_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 翻译结果文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/zip:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/Problem'
  /stats/summary:
    get:
      operationId: GetStatsSummary
      summary: 获取用量统计汇总
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 用量统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStats'
        default:
          $ref: '#/components/responses/Problem'
  /activity:
    parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
    get:
      operationId: ListActivity
      summary: 获取活动审计日志
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 活动审计日志
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ResourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    TranslationJobId:
      name: translationJobId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    BackendId:
      name: backendId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Stage:
      name: stage
      in: path
      required: true
      schema:
        type: string
        enum:
          - translate
          - bootstrap
    SegmentId:
      name: segmentId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Problem:
      description: 错误响应
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: linguaflow
    User:
      type: object
      required:
        - id
        - username
        - email
        - role
        - active
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
        active:
          type: boolean
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthSession:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_at
        - refresh_expires_at
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
    UpdateCurrentUserRequest:
      type: object
      properties:
        display_name:
          type: string
        email:
          type: string
          format: email
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
        new_password:
          type: string
    Organization:
      type: object
      required:
        - id
        - name
        - slug
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        display_name:
          type: string
        description:
          type: string
    OrganizationRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
        slug:
          type: string
        display_name:
          type: string
        description:
          type: string
    OrganizationListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
    OrganizationMember:
      type: object
