openapi: 3.0.3
info:
  title: LinguaFlow Web Service API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /ping:
    get:
      operationId: Ping
      summary: 无鉴权连通测试
      description: 用于前端在登录前快速判断后端 HTTP 服务是否可达；不检查数据库或第三方依赖。
      responses:
        '200':
          description: 服务可达
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/Problem'
  /auth/register:
    post:
      operationId: RegisterAuth
      summary: 注册用户并签发会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        default:
          $ref: '#/components/responses/Problem'
  /auth/login:
    post:
      operationId: LoginAuth
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        default:
          $ref: '#/components/responses/Problem'
  /auth/refresh:
    post:
      operationId: RefreshAuth
      summary: 刷新访问令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        default:
          $ref: '#/components/responses/Problem'
  /auth/logout:
    post:
      operationId: LogoutAuth
      summary: 登出并撤销刷新令牌
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: 已登出
        default:
          $ref: '#/components/responses/Problem'
  /users/me:
    get:
      operationId: GetCurrentUser
      summary: 获取当前用户
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateCurrentUser
      summary: 更新当前用户资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserRequest'
      responses:
        '200':
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Problem'
  /users/me/password:
    put:
      operationId: ChangeCurrentUserPassword
      summary: 修改当前用户密码
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: 密码已更新
        default:
          $ref: '#/components/responses/Problem'
  /orgs:
    get:
      operationId: ListOrganizations
      summary: 列出当前用户所属组织
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 组织列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: CreateOrganization
      summary: 创建组织
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        '201':
          description: 已创建组织
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      operationId: GetOrganization
      summary: 获取组织详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 组织详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateOrganization
      summary: 更新组织信息
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        '200':
          description: 更新后的组织
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/members:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      operationId: ListOrganizationMembers
      summary: 获取组织成员列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMemberListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: AddOrganizationMember
      summary: 添加组织成员
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrganizationMemberRequest'
      responses:
        '201':
          description: 已添加成员
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/UserId'
    put:
      operationId: UpdateOrganizationMember
      summary: 修改组织成员角色
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationMemberRequest'
      responses:
        '200':
          description: 更新后的成员
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteOrganizationMember
      summary: 移除组织成员
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 已移除成员
        default:
          $ref: '#/components/responses/Problem'
  /backends:
    post:
      operationId: CreateUserBackend
      summary: 创建个人后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackendRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListUserBackends
      summary: 列出个人后端
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 后端列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /backends/{backendId}:
    parameters:
      - $ref: '#/components/parameters/BackendId'
    put:
      operationId: UpdateUserBackend
      summary: 更新个人后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBackendRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteUserBackend
      summary: 删除个人后端
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/backends:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    post:
      operationId: CreateOrgBackend
      summary: 创建组织后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackendRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListOrgBackends
      summary: 列出组织后端
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 后端列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/backends/{backendId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/BackendId'
    put:
      operationId: UpdateOrgBackend
      summary: 更新组织后端
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBackendRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Backend'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteOrgBackend
      summary: 删除组织后端
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /projects:
    post:
      operationId: CreateProject
      summary: 创建项目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListProjects
      summary: 列出项目
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: GetProject
      summary: 获取项目详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateProject
      summary: 更新项目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteProject
      summary: 删除项目
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /orgs/{orgId}/projects:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    post:
      operationId: CreateOrgProject
      summary: 创建组织项目
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    get:
      operationId: ListOrgProjects
      summary: 列出组织项目
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: ListProjectResources
      summary: 列出项目资源文件
      security:
        - bearerAuth: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 资源列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: UploadProjectResources
      summary: 上传资源文件到项目
      description: |
        批量上传资源文件，允许部分成功。
        - files 与 paths 按数组下标一一对应
        - paths 使用 / 分隔，例如 ui/common.json、admin/common.json
        - 未提供 paths 时兼容旧客户端，使用上传文件名作为根目录资源路径
        - 项目内资源唯一性以规范化 path 判断，而不是 filename
        - 冲突或失败的文件不会阻断其他文件的上传，每个文件独立返回处理结果
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  maxItems: 50
                  items:
                    type: string
                    format: binary
                paths:
                  type: array
                  description: 与 files 一一对应的项目内资源相对路径；省略时使用文件名作为根目录路径
                  items:
                    type: string
      responses:
        '200':
          description: 批量上传结果（可能包含部分冲突或失败）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceUploadBatchResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/precheck:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      operationId: PrecheckProjectResources
      summary: 上传资源预检
      description: |
        在实际上传前检查批量文件中的冲突情况，不执行任何写入操作。
        - 检查批次内是否有重复路径
        - 检查每个路径是否与项目已有资源冲突
        - 返回每个文件的建议操作（create / conflict / duplicate）
        - 前端可根据结果让用户确认冲突处理策略后再执行实际上传
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - paths
              properties:
                paths:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: string
                  description: 待检查的项目内资源相对路径列表（不包含实际文件）
      responses:
        '200':
          description: 预检结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePrecheckBatchResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/tree:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      operationId: GetProjectResourceTree
      summary: 获取项目资源目录树
      description: |
        按资源 path 聚合生成目录树。当前目录为虚拟节点，资源身份仍由 Resource.path 唯一确定；后续可在此基础上扩展目录移动、重命名等能力。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 资源目录树
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTreeResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: GetResource
      summary: 获取资源详情
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 资源详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: UpdateResource
      summary: 更新资源文件
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: IncrementalUpdateResource
      summary: 增量更新资源文件
      description: |
        上传新版本文件，系统自动对比段落变化：
        - 相同源文本的段落保留已有译文
        - 源文本变化的段落重置为待翻译
        - 新增段落状态为待翻译
        - 不再存在的段落将被删除
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 增量更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncrementalUpdateResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: DeleteResource
      summary: 删除资源文件及其所有段落
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 删除成功
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/download:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: DownloadResourceFile
      summary: 下载资源原始文件
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 资源原始文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/download-translated:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: DownloadTranslatedResourceFile
      summary: 下载资源的翻译结果文件
      description: |
        基于资源当前所有已翻译/已编辑的 segments，渲染并下载翻译后的文件。
        不依赖翻译任务状态，直接读取资源级别的最新翻译数据。
        如果没有任何已翻译的段落，返回 409 Conflict。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 翻译结果文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/segments:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: ListResourceSegments
      summary: 列出资源段落
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - translated
              - edited
              - approved
              - rejected
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: group_key
          in: query
          required: false
          schema:
            type: string
          description: 按分组键过滤 segments（如 epub_file 路径），仅返回属于指定分组的 segments
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 段落列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSegmentListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/segments/{segmentId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
      - $ref: '#/components/parameters/SegmentId'
    patch:
      operationId: UpdateResourceSegment
      summary: 更新资源段落内容
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceSegmentUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/resources/{resourceId}/segments/{segmentId}/review:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ResourceId'
      - $ref: '#/components/parameters/SegmentId'
    patch:
      operationId: ReviewResourceSegment
      summary: 审核单个段落（通过/拒绝/编辑）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
