name: 前端 CI

on:
  push:
    branches: [main, frontend]
  pull_request:
    branches: [main, frontend]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: 代码检查与格式化
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        run: pnpm install
        working-directory: frontend

      - name: 运行 lint
        run: pnpm lint
        working-directory: frontend

  type-check:
    name: TypeScript 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        run: pnpm install
        working-directory: frontend

      - name: 运行类型检查
        run: pnpm type-check
        working-directory: frontend

  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        run: pnpm install
        working-directory: frontend

      - name: 构建前端
        run: pnpm build
        working-directory: frontend

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  openapi:
    name: OpenAPI 类型生成验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装 Redocly CLI
        run: npm install -g @redocly/cli

      - name: 合并 OpenAPI 规范
        run: redocly bundle api/openapi/base.yaml -o api/openapi/openapi-3.0.yaml

      - name: 安装依赖
        run: pnpm install
        working-directory: frontend

      - name: 生成 OpenAPI 类型
        run: pnpm exec openapi-typescript ../api/openapi/openapi-3.0.yaml -o src/api/types.d.ts
        working-directory: frontend

  security:
    name: 依赖安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        run: pnpm install
        working-directory: frontend

      - name: 运行漏洞扫描
        run: pnpm audit --audit-level=high
        working-directory: frontend
