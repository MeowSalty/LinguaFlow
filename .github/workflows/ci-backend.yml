name: 后端 CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, backend]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: 代码检查与格式化
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: 检查 Go 代码格式
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下文件未正确格式化："
            echo "$unformatted"
            exit 1
          fi
        working-directory: backend

      - name: 运行 go vet 静态检查
        run: go vet ./...
        working-directory: backend

  test:
    name: 自动化测试
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linguaflow
          POSTGRES_PASSWORD: linguaflow-test
          POSTGRES_DB: linguaflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linguaflow -d linguaflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: 运行测试（含竞态检测）
        env:
          LINGUAFLOW_TEST_POSTGRES_DSN: postgres://linguaflow:linguaflow-test@localhost:5432/linguaflow_test?sslmode=disable
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: backend

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: 构建二进制文件
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o bin/linguaflow${ext} ./cmd/linguaflow
        working-directory: backend

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linguaflow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/bin/

  security:
    name: 依赖安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: 安装 govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: 运行漏洞扫描
        run: govulncheck ./...
        working-directory: backend
