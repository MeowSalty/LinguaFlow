jobSegments:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
    - $ref: '../base.yaml#/components/parameters/Cursor'
    - $ref: '../base.yaml#/components/parameters/Limit'
  get:
    operationId: ListJobSegments
    summary: 获取任务段列表
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 段列表
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/SegmentListResponse'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobApprove:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  post:
    operationId: ApproveJob
    summary: 批量通过任务审校
    security:
      - bearerAuth: []
    responses:
      '200':
        description: 任务详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Job'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

jobRetranslate:
  parameters:
    - $ref: '../base.yaml#/components/parameters/JobId'
  post:
    operationId: RetranslateRejectedSegments
    summary: 重译被驳回段
    security:
      - bearerAuth: []
    responses:
      '202':
        description: 已重新入队
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Job'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

segmentById:
  parameters:
    - $ref: '../base.yaml#/components/parameters/SegmentId'
  put:
    operationId: EditSegment
    summary: 编辑段译文
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/SegmentEditRequest'
    responses:
      '200':
        description: 段详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Segment'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

segmentApprove:
  parameters:
    - $ref: '../base.yaml#/components/parameters/SegmentId'
  post:
    operationId: ApproveSegment
    summary: 通过段译文
    security:
      - bearerAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/SegmentDecisionRequest'
    responses:
      '200':
        description: 段详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Segment'
      default:
        $ref: '../base.yaml#/components/responses/Problem'

segmentReject:
  parameters:
    - $ref: '../base.yaml#/components/parameters/SegmentId'
  post:
    operationId: RejectSegment
    summary: 驳回段译文
    security:
      - bearerAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/SegmentDecisionRequest'
    responses:
      '200':
        description: 段详情
        content:
          application/json:
            schema:
              $ref: '../base.yaml#/components/schemas/Segment'
      default:
        $ref: '../base.yaml#/components/responses/Problem'
