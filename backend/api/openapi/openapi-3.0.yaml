components:
    parameters:
        OrgId:
            in: path
            name: orgId
            required: true
            schema:
                minimum: 1
                type: integer
        UserId:
            in: path
            name: userId
            required: true
            schema:
                minimum: 1
                type: integer
        components_parameters_OrgId:
            in: path
            name: orgId
            required: true
            schema:
                minimum: 1
                type: integer
        components_parameters_UserId:
            in: path
            name: userId
            required: true
            schema:
                minimum: 1
                type: integer
    responses:
        Problem:
            $ref: '#/components/responses/components_responses_Problem'
        components_responses_Problem:
            content:
                application/problem+json:
                    schema:
                        $ref: '#/components/schemas/components_schemas_common_Problem'
            description: 错误响应
    schemas:
        AddOrganizationMemberRequest:
            properties:
                role:
                    enum:
                        - owner
                        - admin
                        - member
                    type: string
                username:
                    type: string
            required:
                - username
            type: object
        AuthSession:
            properties:
                access_token:
                    type: string
                expires_at:
                    format: date-time
                    type: string
                refresh_expires_at:
                    format: date-time
                    type: string
                refresh_token:
                    type: string
                token_type:
                    type: string
                user:
                    $ref: '#/components/schemas/components_schemas_user_User'
            required:
                - access_token
                - refresh_token
                - token_type
                - expires_at
                - refresh_expires_at
                - user
            type: object
        ChangePasswordRequest:
            properties:
                current_password:
                    type: string
                new_password:
                    type: string
            required:
                - current_password
                - new_password
            type: object
        LoginRequest:
            properties:
                password:
                    type: string
                username:
                    type: string
            required:
                - username
                - password
            type: object
        LogoutRequest:
            properties:
                refresh_token:
                    type: string
            required:
                - refresh_token
            type: object
        Organization:
            properties:
                description:
                    type: string
                display_name:
                    type: string
                id:
                    type: integer
                name:
                    type: string
                slug:
                    type: string
            required:
                - id
                - name
                - slug
            type: object
        OrganizationListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/components_schemas_organization_Organization'
                    type: array
            required:
                - items
            type: object
        OrganizationMember:
            properties:
                id:
                    type: integer
                role:
                    enum:
                        - owner
                        - admin
                        - member
                    type: string
                user:
                    $ref: '#/components/schemas/components_schemas_user_User'
            required:
                - id
                - role
                - user
            type: object
        OrganizationMemberListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/components_schemas_organization_OrganizationMember'
                    type: array
            required:
                - items
            type: object
        OrganizationRequest:
            properties:
                description:
                    type: string
                display_name:
                    type: string
                name:
                    type: string
                slug:
                    type: string
            required:
                - name
                - slug
            type: object
        Problem:
            properties:
                detail:
                    type: string
                status:
                    type: integer
                title:
                    type: string
                type:
                    type: string
            required:
                - title
                - status
            type: object
        RefreshRequest:
            properties:
                refresh_token:
                    type: string
            required:
                - refresh_token
            type: object
        RegisterRequest:
            properties:
                display_name:
                    type: string
                email:
                    format: email
                    type: string
                password:
                    type: string
                username:
                    type: string
            required:
                - username
                - password
                - email
            type: object
        UpdateCurrentUserRequest:
            properties:
                display_name:
                    type: string
                email:
                    format: email
                    type: string
            type: object
        UpdateOrganizationMemberRequest:
            properties:
                role:
                    enum:
                        - owner
                        - admin
                        - member
                    type: string
            required:
                - role
            type: object
        User:
            properties:
                active:
                    type: boolean
                display_name:
                    type: string
                email:
                    format: email
                    type: string
                id:
                    type: integer
                role:
                    type: string
                username:
                    type: string
            required:
                - id
                - username
                - email
                - role
                - active
            type: object
        components_schemas_auth_AuthSession:
            properties:
                access_token:
                    type: string
                expires_at:
                    format: date-time
                    type: string
                refresh_expires_at:
                    format: date-time
                    type: string
                refresh_token:
                    type: string
                token_type:
                    type: string
                user:
                    $ref: '#/components/schemas/components_schemas_user_User'
            required:
                - access_token
                - refresh_token
                - token_type
                - expires_at
                - refresh_expires_at
                - user
            type: object
        components_schemas_auth_LoginRequest:
            properties:
                password:
                    type: string
                username:
                    type: string
            required:
                - username
                - password
            type: object
        components_schemas_auth_LogoutRequest:
            properties:
                refresh_token:
                    type: string
            required:
                - refresh_token
            type: object
        components_schemas_auth_RefreshRequest:
            properties:
                refresh_token:
                    type: string
            required:
                - refresh_token
            type: object
        components_schemas_auth_RegisterRequest:
            properties:
                display_name:
                    type: string
                email:
                    format: email
                    type: string
                password:
                    type: string
                username:
                    type: string
            required:
                - username
                - password
                - email
            type: object
        components_schemas_common_Problem:
            properties:
                detail:
                    type: string
                status:
                    type: integer
                title:
                    type: string
                type:
                    type: string
            required:
                - title
                - status
            type: object
        components_schemas_organization_AddOrganizationMemberRequest:
            properties:
                role:
                    enum:
                        - owner
                        - admin
                        - member
                    type: string
                username:
                    type: string
            required:
                - username
            type: object
        components_schemas_organization_Organization:
            properties:
                description:
                    type: string
                display_name:
                    type: string
                id:
                    type: integer
                name:
                    type: string
                slug:
                    type: string
            required:
                - id
                - name
                - slug
            type: object
        components_schemas_organization_OrganizationListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/components_schemas_organization_Organization'
                    type: array
            required:
                - items
            type: object
        components_schemas_organization_OrganizationMember:
            properties:
                id:
                    type: integer
                role:
                    enum:
                        - owner
                        - admin
                        - member
                    type: string
                user:
                    $ref: '#/components/schemas/components_schemas_user_User'
            required:
                - id
                - role
                - user
            type: object
        components_schemas_organization_OrganizationMemberListResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/components_schemas_organization_OrganizationMember'
                    type: array
            required:
                - items
            type: object
        components_schemas_organization_OrganizationRequest:
            properties:
                description:
                    type: string
                display_name:
                    type: string
                name:
                    type: string
                slug:
                    type: string
            required:
                - name
                - slug
            type: object
        components_schemas_organization_UpdateOrganizationMemberRequest:
            properties:
                role:
                    enum:
                        - owner
                        - admin
                        - member
                    type: string
            required:
                - role
            type: object
        components_schemas_user_ChangePasswordRequest:
            properties:
                current_password:
                    type: string
                new_password:
                    type: string
            required:
                - current_password
                - new_password
            type: object
        components_schemas_user_UpdateCurrentUserRequest:
            properties:
                display_name:
                    type: string
                email:
                    format: email
                    type: string
            type: object
        components_schemas_user_User:
            properties:
                active:
                    type: boolean
                display_name:
                    type: string
                email:
                    format: email
                    type: string
                id:
                    type: integer
                role:
                    type: string
                username:
                    type: string
            required:
                - id
                - username
                - email
                - role
                - active
            type: object
    securitySchemes:
        bearerAuth:
            $ref: '#/components/securitySchemes/components_security-schemes_bearerAuth'
        components_security-schemes_bearerAuth:
            bearerFormat: JWT
            scheme: bearer
            type: http
info:
    title: LinguaFlow Web Service API
    version: 0.1.0
openapi: 3.0.3
paths:
    /auth/login:
        post:
            operationId: LoginAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_LoginRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_auth_AuthSession'
                    description: 登录成功
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            summary: 用户登录
    /auth/logout:
        post:
            operationId: LogoutAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_LogoutRequest'
                required: true
            responses:
                "204":
                    description: 已登出
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 登出并撤销刷新令牌
    /auth/refresh:
        post:
            operationId: RefreshAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_RefreshRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_auth_AuthSession'
                    description: 刷新成功
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            summary: 刷新访问令牌
    /auth/register:
        post:
            operationId: RegisterAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_auth_RegisterRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_auth_AuthSession'
                    description: 已创建
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            summary: 注册用户并签发会话
    /orgs:
        get:
            operationId: ListOrganizations
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_OrganizationListResponse'
                    description: 组织列表
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 列出当前用户所属组织
        post:
            operationId: CreateOrganization
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_organization_OrganizationRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_Organization'
                    description: 已创建组织
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 创建组织
    /orgs/{orgId}:
        get:
            operationId: GetOrganization
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_Organization'
                    description: 组织详情
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 获取组织详情
        parameters:
            - $ref: '#/components/parameters/components_parameters_OrgId'
        put:
            operationId: UpdateOrganization
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_organization_OrganizationRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_Organization'
                    description: 更新后的组织
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 更新组织信息
    /orgs/{orgId}/members:
        get:
            operationId: ListOrganizationMembers
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_OrganizationMemberListResponse'
                    description: 成员列表
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 获取组织成员列表
        parameters:
            - $ref: '#/components/parameters/components_parameters_OrgId'
        post:
            operationId: AddOrganizationMember
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_organization_AddOrganizationMemberRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_OrganizationMember'
                    description: 已添加成员
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 添加组织成员
    /orgs/{orgId}/members/{userId}:
        delete:
            operationId: DeleteOrganizationMember
            responses:
                "204":
                    description: 已移除成员
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 移除组织成员
        parameters:
            - $ref: '#/components/parameters/components_parameters_OrgId'
            - $ref: '#/components/parameters/components_parameters_UserId'
        put:
            operationId: UpdateOrganizationMember
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_organization_UpdateOrganizationMemberRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_organization_OrganizationMember'
                    description: 更新后的成员
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 修改组织成员角色
    /users/me:
        get:
            operationId: GetCurrentUser
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_user_User'
                    description: 当前用户
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 获取当前用户
        put:
            operationId: UpdateCurrentUser
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_user_UpdateCurrentUserRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/components_schemas_user_User'
                    description: 更新后的用户
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 更新当前用户资料
    /users/me/password:
        put:
            operationId: ChangeCurrentUserPassword
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/components_schemas_user_ChangePasswordRequest'
                required: true
            responses:
                "204":
                    description: 密码已更新
                default:
                    $ref: '#/components/responses/components_responses_Problem'
            security:
                - bearerAuth: []
            summary: 修改当前用户密码
servers:
    - url: /api/v1
