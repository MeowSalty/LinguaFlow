prompt_template:
  id: -1001
  name: "通用翻译"
  description: "默认配置，适用于一般文档翻译"

translation_profile:
  id: -2001
  name: "通用翻译 - 默认配置"
  description: "默认配置，适用于一般文档翻译"
  config:
    split:
      enabled: true
      strategy: paragraph
      max_chars: 1200
    protect:
      enabled: true
      rules: [code, link, placeholder, xml]
    postprocess:
      enabled: true
      trim_spaces: true
    repair:
      enabled: true
      json_structural: true
      schema_aliases: true
      partial: true
      partial_threshold: 0.5
      placeholder_normalize: true
      prompt_upgrade: true
    rounds:
      - batch_size: 10
        concurrency: 3
        fallback_shrink: 0.5
        rate_limit_per_sec: 0
        backend_mode: "prepend"
        backend_order: []
        retry:
          max_attempts: 3
          backoff_ms: 2000
          jitter: true
    glossary:
      enabled: false
      bootstrap:
        mode: "off"
        save: true
        max_terms_per_batch: 20
        min_source_len: 2
        inline_conflict_strategy: "rewrite-local"
